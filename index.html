    input, textarea, button { font-family: inherit; }
    input[type="text"], input[type="number"], input[type="date"], textarea { font-size: 16px !important; }
    .layout-shell { display: flex; flex-direction: column; height: 100vh; }
    .topbar { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 1.5px solid #e2e8f0; padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.05); flex-shrink: 0; }

    .panel-left  { width: 100%; height: 100%; overflow-y: auto; }
    .panel-right { display: none; }
    @media (min-width: 768px) {
      .panel-left  { width: 300px; min-width: 260px; max-width: 320px; border-right: 1.5px solid #e2e8f0; background: #fff; flex-shrink: 0; }
      .panel-right { display: block; flex: 1; overflow: hidden; background: #f4f7fb; }
    }
    .panel-scroll { height: 100%; overflow-y: auto; }
    .pad  { padding: 16px 14px 60px; }
    .pad-sm { padding: 14px 12px 40px; }
    .pt-row { cursor: pointer; transition: background 0.1s; }

function loadData() {
  try { const r = localStorage.getItem("pt_eval_data"); if (r) return JSON.parse(r); } catch {}
  return { patients:[], records:{}, templates:DEFAULT_TEMPLATES };
}
function saveData(d) { localStorage.setItem("pt_eval_data", JSON.stringify(d)); }

function useIsTablet() {
  const [v, setV] = useState(window.innerWidth >= 768);
  useEffect(() => {
    const fn = () => setV(window.innerWidth >= 768);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);
  return v;
}

// ── 환자 리스트 패널 ─────────────────────────────────────────────
function PatientListPanel({ db, persist, selectedPatient, onSelect }) {
  const [search, setSearch] = useState("");
  const [addMode, setAddMode] = useState(false);
  const [newId, setNewId] = useState("");
  const [newName, setNewName] = useState("");

  const addPatient = () => {
    if (!newId.trim() || !newName.trim()) return;
    if (db.patients.find(p => p.id === newId.trim())) { alert("이미 존재하는 환자 ID입니다."); return; }
    persist({ ...db, patients:[...db.patients,{id:newId.trim(),name:newName.trim()}] });
    setNewId(""); setNewName(""); setAddMode(false);
  };

  const delPatient = (id) => {
    if (!confirm("환자를 삭제하면 모든 기록도 삭제됩니다. 계속하시겠습니까?")) return;
    const rec={...db.records}; delete rec[id];
    persist({...db,patients:db.patients.filter(p=>p.id!==id),records:rec});
  };

  const filtered = db.patients.filter(p => p.id.includes(search) || p.name.includes(search));

  return (
    <div className="panel-scroll">
      <div className="pad-sm">
        <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
          <div style={{flex:1,display:"flex",alignItems:"center",gap:"7px",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:"10px",padding:"8px 10px"}}>
            <IcoSearch/>
            <input style={{border:"none",outline:"none",fontSize:"14px",color:"#334155",width:"100%",background:"transparent"}}
              placeholder="ID 또는 이름" value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <button style={{display:"flex",alignItems:"center",gap:"4px",background:"#2563eb",color:"#fff",border:"none",borderRadius:"10px",padding:"8px 12px",fontSize:"12px",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}
            onClick={()=>setAddMode(true)}><IcoPlus/> 추가</button>
        </div>

        {addMode && (
          <div style={{display:"flex",flexDirection:"column",gap:"7px",marginBottom:"10px",background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:"10px",padding:"12px"}}>
            <input style={{border:"1.5px solid #e2e8f0",borderRadius:"7px",padding:"8px 10px",outline:"none",color:"#1e293b",fontSize:"15px"}}
              placeholder="환자 ID" value={newId} onChange={e=>setNewId(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPatient()}/>
            <input style={{border:"1.5px solid #e2e8f0",borderRadius:"7px",padding:"8px 10px",outline:"none",color:"#1e293b",fontSize:"15px"}}
              placeholder="이름" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPatient()}/>
            <div style={{display:"flex",gap:"7px"}}>
              <button style={{flex:1,background:"#2563eb",color:"#fff",border:"none",borderRadius:"7px",padding:"9px",fontSize:"14px",fontWeight:600,cursor:"pointer"}} onClick={addPatient}>저장</button>
              <button style={{flex:1,background:"#f1f5f9",color:"#475569",border:"none",borderRadius:"7px",padding:"9px",fontSize:"14px",cursor:"pointer"}} onClick={()=>{setAddMode(false);setNewId("");setNewName("");}}>취소</button>
            </div>
          </div>
        )}

        <div style={{background:"#fff",borderRadius:"12px",overflow:"hidden",border:"1.5px solid #e2e8f0",boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>
          {filtered.length===0 ? (
            <div style={{padding:"32px",textAlign:"center",color:"#94a3b8",fontSize:"13px"}}>{search?"검색 결과 없음":"등록된 환자가 없습니다."}</div>
          ) : filtered.map(p => {
            const total=EVAL_KEYS.reduce((s,k)=>s+(db.records[p.id]?.[k]?.length||0),0);
            const isSel=selectedPatient?.id===p.id;
            return (
              <div key={p.id} className="pt-row"
                style={{padding:"11px 12px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",justifyContent:"space-between",background:isSel?"#eff6ff":"white"}}
                onClick={()=>onSelect(p)}>
                <div style={{minWidth:0}}>
                  <div style={{fontFamily:"monospace",color:"#2563eb",fontSize:"12px",marginBottom:"1px"}}>{p.id}</div>
                  <div style={{fontWeight:600,fontSize:"14px",color:"#1e293b"}}>{p.name}</div>
                  <div style={{fontSize:"11px",color:"#94a3b8",marginTop:"1px"}}>{total}건의 기록</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:"6px",flexShrink:0}}>
                  {isSel && <div style={{width:"6px",height:"6px",borderRadius:"50%",background:"#2563eb"}}/>}
                  <button style={S.delBtn} onClick={e=>{e.stopPropagation();delPatient(p.id);}}><IcoTrash/></button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── 오른쪽 콘텐츠 패널 ───────────────────────────────────────────
function ContentPanel({ db, persist, patient, isTablet, onBackToList }) {
  const [rightView, setRightView] = useState("eval-select");
  const [evalKey, setEvalKey] = useState(null);
  const [editRec, setEditRec] = useState(null);
  const [tmplJson, setTmplJson] = useState("");
  const [tmplErr, setTmplErr] = useState("");

  useEffect(() => { setRightView("eval-select"); setEvalKey(null); setEditRec(null); }, [patient?.id]);

  const getRecs = (ek) => (db.records[patient?.id]?.[ek]||[]).slice().sort((a,b)=>b.savedAt-a.savedAt);

  const saveRec = (ek, data, rid) => {
    const rec={...db.records}, pid=patient.id;
    if (!rec[pid]) rec[pid]={};
    if (!rec[pid][ek]) rec[pid][ek]=[];
    if (rid!=null) rec[pid][ek]=rec[pid][ek].map(r=>r.id===rid?{...r,data,savedAt:Date.now()}:r);
    else rec[pid][ek]=[...rec[pid][ek],{id:Date.now(),data,savedAt:Date.now()}];
    persist({...db,records:rec});
  };

  const delRec = (ek, rid) => {
    if (!confirm("이 기록을 삭제하시겠습니까?")) return;
    const rec={...db.records};
    rec[patient.id][ek]=rec[patient.id][ek].filter(r=>r.id!==rid);
    persist({...db,records:rec});
  };

  const goBack = () => {
    if (rightView==="eval-form") { setEditRec(null); setRightView("eval-history"); }
    else if (rightView==="eval-history") { setEvalKey(null); setRightView("eval-select"); }
    else if (rightView==="template-editor") setRightView("eval-select");
    else if (rightView==="eval-select" && !isTablet) onBackToList();
  };

  const crumb = () => {
    if (!patient) return "";
    const base = `${patient.id}  ${patient.name}`;
    if (rightView==="template-editor") return "서식 편집";
    if (evalKey && (rightView==="eval-history"||rightView==="eval-form")) return `${base}  ›  ${evalKey}`;
    return base;
  };

  if (!patient) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",flexDirection:"column",gap:"10px"}}>
      <IcoUser/>
      <span style={{color:"#94a3b8",fontSize:"14px"}}>환자를 선택하세요</span>
    </div>
  );

  const showBack = rightView!=="eval-select" || !isTablet;

  return (
    <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"0 14px",height:"44px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:"4px",minWidth:0}}>
          {showBack && <button onClick={goBack} style={{background:"none",border:"none",padding:"4px 4px 4px 0",color:"#475569",cursor:"pointer",display:"flex",alignItems:"center",flexShrink:0}}><IcoBack/></button>}
          <span style={{fontSize:"13px",fontWeight:600,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{crumb()}</span>
        </div>
        {rightView==="eval-select" && (
          <button style={{display:"flex",alignItems:"center",gap:"4px",background:"none",border:"1px solid #cbd5e1",borderRadius:"7px",padding:"5px 9px",fontSize:"11px",color:"#475569",cursor:"pointer"}}
            onClick={()=>{setTmplJson(JSON.stringify(db.templates,null,2));setTmplErr("");setRightView("template-editor");}}>
            <IcoSettings/> 서식 편집
          </button>
        )}
      </div>

      <div className="panel-scroll" style={{flex:1}}>
        <div className="pad-sm">

          {rightView==="eval-select" && (
            <>
              <p style={S.secLabel}>평가 항목 선택</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"10px"}}>
                {EVAL_KEYS.map(key=>{
                  const col=EVAL_COLORS[key], tmpl=db.templates[key], cnt=getRecs(key).length;
                  return (
                    <div key={key} onClick={()=>{setEvalKey(key);setRightView("eval-history");}}
                      style={{border:`2px solid ${col.border}`,borderRadius:"12px",padding:"16px 14px",cursor:"pointer",background:col.bg,boxShadow:"0 2px 6px rgba(0,0,0,0.05)"}}>
                      <div style={{fontSize:"18px",fontWeight:800,color:col.accent,marginBottom:"2px"}}>{key}</div>
                      <div style={{fontSize:"11px",color:col.text,marginBottom:"8px",lineHeight:1.4}}>{tmpl?.label||key}</div>
                      <div style={{display:"flex",alignItems:"center",gap:"4px",fontSize:"11px",fontWeight:600,color:col.accent}}><IcoDoc/> {cnt}건</div>
                    </div>
                  );
                })}
              </div>
            </>
          )}

          {rightView==="eval-history" && evalKey && (
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}}>
                <p style={S.secLabel}>저장된 기록</p>
                <button style={{display:"flex",alignItems:"center",gap:"4px",background:EVAL_COLORS[evalKey].accent,color:"#fff",border:"none",borderRadius:"9px",padding:"7px 12px",fontSize:"12px",fontWeight:600,cursor:"pointer"}}
                  onClick={()=>{setEditRec(null);setRightView("eval-form");}}>
                  <IcoPlus/> 새 기록
                </button>
              </div>
              {getRecs(evalKey).length===0 ? (
                <div style={{background:"#fff",border:"1.5px dashed #cbd5e1",borderRadius:"12px",padding:"36px 20px",textAlign:"center",color:"#475569",lineHeight:2.2}}>
                  아직 기록이 없습니다.<br/><span style={{color:"#94a3b8",fontSize:"12px"}}>새 기록 버튼을 눌러 시작하세요.</span>
                </div>
              ) : (
                <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
                  {getRecs(evalKey).map(rec=>{
                    const col=EVAL_COLORS[evalKey];
                    return (
                      <div key={rec.id} style={{background:"#fff",border:"1.5px solid #e2e8f0",borderLeft:`4px solid ${col.accent}`,borderRadius:"10px",padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"8px"}}>
                        <div>
                          <div style={{fontSize:"13px",fontWeight:700,color:col.accent}}>검사일: {rec.data?.date||"미기재"}</div>
                          <div style={{fontSize:"11px",color:"#94a3b8",marginTop:"2px"}}>{new Date(rec.savedAt).toLocaleString("ko-KR")}</div>
                        </div>
                        <div style={{display:"flex",gap:"7px",alignItems:"center"}}>
                          <button style={{background:"none",border:`1.5px solid ${col.accent}`,borderRadius:"7px",padding:"5px 12px",fontSize:"12px",fontWeight:600,cursor:"pointer",color:col.accent}}
                            onClick={()=>{setEditRec(rec);setRightView("eval-form");}}>열람/수정</button>
                          <button style={S.delBtn} onClick={()=>delRec(evalKey,rec.id)}><IcoTrash/></button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}

          {rightView==="eval-form" && evalKey && (
            <EvalForm
              template={db.templates[evalKey]}
              col={EVAL_COLORS[evalKey]}
              initialData={editRec?.data||null}
              onSave={data=>{saveRec(evalKey,data,editRec?.id??null);setEditRec(null);setRightView("eval-history");}}
              onCancel={()=>{setEditRec(null);setRightView("eval-history");}}
            />
          )}

          {rightView==="template-editor" && (
            <>
              <p style={S.secLabel}>서식 편집 (JSON)</p>
              <p style={{fontSize:"12px",color:"#64748b",marginBottom:"10px"}}>각 평가 항목 구조를 직접 수정할 수 있습니다.</p>
              {tmplErr && <div style={S.errorBox}>{tmplErr}</div>}
              <textarea style={{width:"100%",minHeight:"360px",border:"1.5px solid #e2e8f0",borderRadius:"10px",padding:"12px",fontSize:"12px",fontFamily:"monospace",outline:"none",color:"#1e293b",resize:"vertical",lineHeight:1.6}}
                value={tmplJson} onChange={e=>setTmplJson(e.target.value)} spellCheck={false}/>
              <div style={{display:"flex",gap:"8px",marginTop:"10px"}}>
                <button style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:"9px",padding:"11px 24px",fontSize:"14px",fontWeight:700,cursor:"pointer"}}
                  onClick={()=>{try{const p=JSON.parse(tmplJson);persist({...db,templates:p});setRightView("eval-select");setTmplErr("");}catch(e){setTmplErr("JSON 오류: "+e.message);}}}>저장</button>
                <button style={{background:"#f1f5f9",color:"#475569",border:"none",borderRadius:"9px",padding:"11px 18px",fontSize:"14px",cursor:"pointer"}} onClick={()=>setRightView("eval-select")}>취소</button>
              </div>
            </>
          )}

        </div>
      </div>
    </div>
  );
}

// ── 메인 앱 ─────────────────────────────────────────────────────
function App() {
  const [db, setDb] = useState(()=>loadData());
  const [patient, setPatient] = useState(null);
  const [mobileView, setMobileView] = useState("list");
  const isTablet = useIsTablet();
  const persist = nd => { setDb(nd); saveData(nd); };

  const selectPatient = (p) => {
    setPatient(p);
    if (!isTablet) setMobileView("content");
  };

  return (
    <div className="layout-shell">
      <div className="topbar">
        <div style={{display:"flex",alignItems:"center",gap:"6px",minWidth:0,flex:1}}>
          {!isTablet && mobileView==="content" && (
            <button onClick={()=>setMobileView("list")} style={{background:"none",border:"none",padding:"6px 6px 6px 0",color:"#475569",cursor:"pointer",display:"flex",alignItems:"center",flexShrink:0}}><IcoBack/></button>
          )}
          <span style={{fontSize:"14px",fontWeight:700,color:"#1e293b"}}>
            {isTablet ? "환자 평가 관리" : (mobileView==="content"&&patient ? `${patient.id}  ${patient.name}` : "환자 평가 관리")}
          </span>
        </div>
      </div>

      <div className="main-area">
        <div className="panel-left" style={!isTablet&&mobileView==="content"?{display:"none"}:{}}>
          <PatientListPanel db={db} persist={persist} selectedPatient={patient} onSelect={selectPatient}/>
        </div>
        <div className="panel-right" style={!isTablet&&mobileView==="list"?{display:"none"}:{display:"block",flex:1,overflow:"hidden"}}>
          <ContentPanel db={db} persist={persist} patient={patient} isTablet={isTablet} onBackToList={()=>setMobileView("list")}/>
        </div>
      </div>
    </div>
  );
}

// ── 평가 서식 컴포넌트 ───────────────────────────────────────────
function EvalForm({ template, col, initialData, onSave, onCancel }) {
  const todayStr = new Date().toISOString().slice(0,10);
  const [formData, setFormData] = useState(()=>{
    if (initialData) return JSON.parse(JSON.stringify(initialData));
    const init={};
    (template?.fields||[]).forEach(f=>{
      if (f.type==="table") init[f.id]=f.rows.map(row=>({left:"",right:row.length>=3?"":undefined,score:row.length<3?"":undefined}));
      else if (f.type==="date") init[f.id]=todayStr;
      else if (f.type==="toggle") init[f.id]=f.options?.[f.options.length-1]||"";
      else init[f.id]="";
    });
    return init;
  });

  const setField=(id,val)=>setFormData(prev=>({...prev,[id]:val}));
  const setCell=(tid,ri,ck,val)=>setFormData(prev=>{const arr=[...(prev[tid]||[])];arr[ri]={...arr[ri],[ck]:val};return {...prev,[tid]:arr};});

  return (
    <div>
      <div style={S.formCard}>
        {(template?.fields||[]).map(field=>{
          if (field.type==="fac_select") {
            const sel=formData[field.id]??"";
            return (
              <div key={field.id} style={S.fieldRow}>
                <label style={S.fieldLabel}>{field.label}</label>
                <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                  {field.rows.map(([val,desc])=>{
                    const on=sel===val;
                    return (
                      <div key={val} onClick={()=>{setField(field.id,val);if(field.linkedTo)setField(field.linkedTo,val);}}
                        style={{display:"flex",alignItems:"center",gap:"10px",padding:"10px 12px",borderRadius:"9px",border:`1.5px solid ${on?col.accent:"#e2e8f0"}`,cursor:"pointer",background:on?col.accent:(Number(val)%2===0?"#fafbfc":"#fff"),color:on?"#fff":"#334155",transition:"all 0.15s"}}>
                        <span style={{minWidth:"26px",height:"26px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:"13px",flexShrink:0,background:on?"rgba(255,255,255,0.25)":col.bg,color:on?"#fff":col.accent}}>{val}</span>
                        <span style={{fontSize:"13px"}}>{desc}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          }
          if (field.type==="table") {
            const td=formData[field.id]||[], two=field.headers.length>=4, one=field.headers.length===3;
            return (
              <div key={field.id} style={S.tblSection}>
                <div style={{overflowX:"auto"}}>
                  <table style={{...S.table,marginBottom:0}}>
                    <thead><tr>{field.headers.map((h,i)=><th key={i} style={S.th}>{h}</th>)}</tr></thead>
                    <tbody>
                      {field.rows.map((row,ri)=>(
                        <tr key={ri} style={{background:ri%2===0?"#fafbfc":"white"}}>
                          {row.map((cell,ci)=><td key={ci} style={S.td}>{cell}</td>)}
                          {two&&<><td style={S.td}><input style={S.cellInput} value={td[ri]?.left??""} onChange={e=>setCell(field.id,ri,"left",e.target.value)}/></td><td style={S.td}><input style={S.cellInput} value={td[ri]?.right??""} onChange={e=>setCell(field.id,ri,"right",e.target.value)}/></td></>}
                          {one&&!two&&<td style={S.td}><input style={S.cellInput} value={td[ri]?.score??""} onChange={e=>setCell(field.id,ri,"score",e.target.value)}/></td>}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          }
          return (
            <div key={field.id} style={S.fieldRow}>
              <label style={S.fieldLabel}>{field.label}</label>
              {field.type==="toggle" ? (
                <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>
                  {field.options.map(opt=>{
                    const on=formData[field.id]===opt;
                    return <button key={opt} onClick={()=>setField(field.id,opt)}
                      style={{border:`1.5px solid ${on?col.accent:"#cbd5e1"}`,borderRadius:"9px",padding:"8px 16px",fontSize:"14px",cursor:"pointer",background:on?col.accent:"#fff",color:on?"#fff":"#475569",fontWeight:on?700:400}}>{opt}</button>;
                  })}
                </div>
              ) : field.type==="textarea" ? (
                <textarea style={S.textarea} placeholder={field.placeholder} value={formData[field.id]||""} onChange={e=>setField(field.id,e.target.value)}/>
              ) : (
                <input style={S.input} type={field.type||"text"} placeholder={field.placeholder} value={formData[field.id]||""} onChange={e=>setField(field.id,e.target.value)}/>
              )}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:"8px"}}>
        <button style={{background:col.accent,color:"#fff",border:"none",borderRadius:"10px",padding:"11px 26px",fontSize:"14px",fontWeight:700,cursor:"pointer"}} onClick={()=>onSave(formData)}>저장</button>
        <button style={{background:"#f1f5f9",color:"#475569",border:"none",borderRadius:"10px",padding:"11px 18px",fontSize:"14px",cursor:"pointer"}} onClick={onCancel}>취소</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

              ["발목", "배측굴곡 (전경골근)"], ["발목", "저측굴곡 (비복근)"],

    const EVAL_KEYS = ["10mWT", "ROM", "MMT", "BBS", "FAC"];

    const EVAL_COLORS = {

      ROM:     { bg: "#edf7ee", border: "#3daa5c", text: "#1a6b35", accent: "#3daa5c" },
      MMT:     { bg: "#fef3e2", border: "#e8961e", text: "#7a4d0a", accent: "#e8961e" },
      BBS:     { bg: "#f3eeff", border: "#8b5cf6", text: "#4c1d95", accent: "#8b5cf6" },
      FAC:     { bg: "#fde8ef", border: "#e53e6d", text: "#7a1030", accent: "#e53e6d" },
    };

    // ── localStorage 헬퍼 ──────────────────────────────────────────
    function loadData() {
      try {
        const raw = localStorage.getItem("pt_eval_data");
        if (raw) return JSON.parse(raw);
      } catch {}
      return { patients: [], records: {}, templates: DEFAULT_TEMPLATES };
    }
    function saveData(data) {
      localStorage.setItem("pt_eval_data", JSON.stringify(data));
    }

    // ── SVG 아이콘 ─────────────────────────────────────────────────

    // ── 메인 앱 ────────────────────────────────────────────────────
    function App() {
      const [db, setDb] = useState(() => loadData());
      const [view, setView] = useState("list");
      const [selectedPatient, setSelectedPatient] = useState(null);
      const [selectedEval, setSelectedEval] = useState(null);
      const [editingRecord, setEditingRecord] = useState(null);
      const [search, setSearch] = useState("");
      const [addMode, setAddMode] = useState(false);
      const [newId, setNewId] = useState("");
      const [newName, setNewName] = useState("");
      const [templateJson, setTemplateJson] = useState("");
      const [templateError, setTemplateError] = useState("");

      const persist = (newDb) => { setDb(newDb); saveData(newDb); };

      const addPatient = () => {
        if (!newId.trim() || !newName.trim()) return;
        if (db.patients.find(p => p.id === newId.trim())) { alert("이미 존재하는 환자 ID입니다."); return; }
        persist({ ...db, patients: [...db.patients, { id: newId.trim(), name: newName.trim() }] });
        setNewId(""); setNewName(""); setAddMode(false);
      };

      const deletePatient = (id) => {
        if (!confirm("환자를 삭제하면 모든 기록도 함께 삭제됩니다. 계속하시겠습니까?")) return;
        const records = { ...db.records };
        delete records[id];
        persist({ ...db, patients: db.patients.filter(p => p.id !== id), records });
      };

      const getRecords = (patientId, evalKey) =>
        (db.records[patientId]?.[evalKey] || []).slice().sort((a, b) => b.savedAt - a.savedAt);

      const saveRecord = (patientId, evalKey, formData, recordId) => {
        const records = { ...db.records };
        if (!records[patientId]) records[patientId] = {};
        if (!records[patientId][evalKey]) records[patientId][evalKey] = [];
        if (recordId !== null && recordId !== undefined) {
          records[patientId][evalKey] = records[patientId][evalKey].map(r =>
            r.id === recordId ? { ...r, data: formData, savedAt: Date.now() } : r
          );
        } else {
          records[patientId][evalKey] = [...records[patientId][evalKey], { id: Date.now(), data: formData, savedAt: Date.now() }];
        }
        persist({ ...db, records });
      };

      const deleteRecord = (patientId, evalKey, recordId) => {
        if (!confirm("이 기록을 삭제하시겠습니까?")) return;
        const records = { ...db.records };
        records[patientId][evalKey] = records[patientId][evalKey].filter(r => r.id !== recordId);
        persist({ ...db, records });
      };

      const goBack = () => {
        if (view === "eval-form") { setEditingRecord(null); setView("eval-history"); }
        else if (view === "eval-history") { setSelectedEval(null); setView("eval-select"); }
        else if (view === "eval-select") { setSelectedPatient(null); setView("list"); }
        else if (view === "template-editor") setView("list");
      };

      const crumb = () => {
        if (!selectedPatient) return "환자 평가 관리";
        const base = `${selectedPatient.id}  ${selectedPatient.name}`;
        if (!selectedEval) return base;
        return `${base}  ›  ${selectedEval}`;
      };

      const filtered = db.patients.filter(p => p.id.includes(search) || p.name.includes(search));

      // 공통 스타일
      const css = {
        topbar: { position: "sticky", top: 0, zIndex: 100, background: "#fff", borderBottom: "1.5px solid #e2e8f0", padding: "0 16px", height: "52px", display: "flex", alignItems: "center", justifyContent: "space-between", boxShadow: "0 2px 8px rgba(0,0,0,0.05)" },
        topLeft: { display: "flex", alignItems: "center", gap: "8px", minWidth: 0 },
        titleText: { fontSize: "14px", fontWeight: 700, color: "#1e293b", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" },

        toolbar: { display: "flex", gap: "8px", marginBottom: "12px" },
        searchWrap: { flex: 1, display: "flex", alignItems: "center", gap: "8px", background: "#fff", border: "1.5px solid #e2e8f0", borderRadius: "10px", padding: "8px 12px" },
        searchInput: { border: "none", outline: "none", fontSize: "15px", color: "#334155", width: "100%", background: "transparent" },
        addBtn: (color) => ({ display: "flex", alignItems: "center", gap: "5px", background: color || "#2563eb", color: "#fff", border: "none", borderRadius: "10px", padding: "8px 14px", fontSize: "13px", fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }),
        addRow: { display: "flex", gap: "8px", marginBottom: "12px", flexWrap: "wrap" },
        addInput: { border: "1.5px solid #cbd5e1", borderRadius: "8px", padding: "9px 12px", fontSize: "15px", outline: "none", color: "#1e293b", flex: 1, minWidth: "120px" },

        cancelFormBtn: { background: "#f1f5f9", color: "#475569", border: "none", borderRadius: "10px", padding: "12px 20px", fontSize: "15px", cursor: "pointer" },
        toggleGroup: { display: "flex", gap: "8px", flexWrap: "wrap" },
        toggleBtn: (selected, accent) => ({ border: `1.5px solid ${selected ? accent : "#cbd5e1"}`, borderRadius: "9px", padding: "9px 18px", fontSize: "14px", cursor: "pointer", background: selected ? accent : "#fff", color: selected ? "#fff" : "#475569", fontWeight: selected ? 700 : 400, transition: "all 0.15s" }),
        facTable: { display: "flex", flexDirection: "column", gap: "7px" },
        facRow: (selected, accent, bg, even) => ({ display: "flex", alignItems: "center", gap: "12px", padding: "11px 14px", borderRadius: "9px", border: `1.5px solid ${selected ? accent : "#e2e8f0"}`, cursor: "pointer", background: selected ? accent : (even ? "#fafbfc" : "#fff"), color: selected ? "#fff" : "#334155", transition: "all 0.15s" }),
        facBadge: (selected, accent, bg) => ({ minWidth: "28px", height: "28px", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: "14px", flexShrink: 0, background: selected ? "rgba(255,255,255,0.25)" : bg, color: selected ? "#fff" : accent }),
        templateTextarea: { width: "100%", minHeight: "400px", border: "1.5px solid #e2e8f0", borderRadius: "10px", padding: "14px", fontSize: "13px", fontFamily: "monospace", outline: "none", color: "#1e293b", resize: "vertical", lineHeight: 1.6 },
        errorBox: { background: "#fef2f2", border: "1.5px solid #fca5a5", borderRadius: "8px", padding: "10px 14px", color: "#dc2626", fontSize: "12px", marginBottom: "12px" },
      };

      return (
        <div>
          {/* 탑바 */}
          <div style={css.topbar}>
            <div style={css.topLeft}>
              {view !== "list" && (
                <button onClick={goBack} style={css.backBtn}><IcoBack /></button>
              )}
              <span style={css.titleText}>{crumb()}</span>
            </div>
            {view === "list" && (
              <button onClick={() => { setTemplateJson(JSON.stringify(db.templates, null, 2)); setTemplateError(""); setView("template-editor"); }} style={css.settingsBtn}>
                <IcoSettings /> 서식 편집
              </button>
            )}
          </div>

          {/* ── 환자 리스트 ── */}
          {view === "list" && (
            <div style={css.container}>
              <div style={css.toolbar}>
                <div style={css.searchWrap}>
                  <IcoSearch />
                  <input style={css.searchInput} placeholder="ID 또는 이름 검색" value={search} onChange={e => setSearch(e.target.value)} />
                </div>
                <button style={css.addBtn()} onClick={() => setAddMode(true)}><IcoPlus /> 추가</button>
              </div>

              {addMode && (
                <div style={css.addRow}>
                  <input style={css.addInput} placeholder="환자 ID" value={newId} onChange={e => setNewId(e.target.value)} onKeyDown={e => e.key === "Enter" && addPatient()} />
                  <input style={css.addInput} placeholder="이름" value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === "Enter" && addPatient()} />
                  <button style={css.confirmBtn} onClick={addPatient}>저장</button>
                  <button style={css.cancelBtn} onClick={() => { setAddMode(false); setNewId(""); setNewName(""); }}>취소</button>
                </div>
              )}

              <div style={css.tableWrap}>
                <table style={css.table}>
                  <thead>
                    <tr>
                      <th style={{ ...css.th, width: "130px" }}>환자 ID</th>
                      <th style={css.th}>이름</th>
                      <th style={{ ...css.th, width: "60px", textAlign: "center" }}>기록</th>
                      <th style={{ ...css.th, width: "50px" }}></th>
                    </tr>
                  </thead>
                  <tbody>
                    {filtered.length === 0 && (
                      <tr><td colSpan={4} style={css.emptyCell}>{search ? "검색 결과가 없습니다." : "등록된 환자가 없습니다."}</td></tr>
                    )}
                    {filtered.map(p => {
                      const totalRec = EVAL_KEYS.reduce((s, k) => s + (db.records[p.id]?.[k]?.length || 0), 0);
                      return (
                        <tr key={p.id} onClick={() => { setSelectedPatient(p); setView("eval-select"); }}
                          style={{ cursor: "pointer" }}>
                          <td style={{ ...css.td, fontFamily: "monospace", color: "#2563eb", fontSize: "13px" }}>{p.id}</td>
                          <td style={{ ...css.td, fontWeight: 600 }}>{p.name}</td>
                          <td style={{ ...css.td, textAlign: "center", color: "#64748b", fontSize: "12px" }}>{totalRec}건</td>
                          <td style={{ ...css.td, textAlign: "center" }} onClick={e => { e.stopPropagation(); deletePatient(p.id); }}>
                            <button style={css.deleteBtn}><IcoTrash /></button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {/* ── 평가 항목 선택 ── */}
          {view === "eval-select" && selectedPatient && (
            <div style={css.container}>
              <p style={css.sectionLabel}>평가 항목 선택</p>
              <div style={css.evalGrid}>
                {EVAL_KEYS.map(key => {
                  const tmpl = db.templates[key];
                  const col = EVAL_COLORS[key];
                  const recCount = getRecords(selectedPatient.id, key).length;
                  return (
                    <div key={key} style={css.evalCard(col)}
                      onClick={() => { setSelectedEval(key); setView("eval-history"); }}>
                      <div style={css.evalKey(col)}>{key}</div>
                      <div style={css.evalName(col)}>{tmpl?.label || key}</div>
                      <div style={css.evalCount(col)}><IcoDoc /> {recCount}건</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── 기록 목록 ── */}
          {view === "eval-history" && selectedPatient && selectedEval && (
            <div style={css.container}>
              <div style={css.historyHeader}>
                <p style={css.sectionLabel}>저장된 기록</p>
                <button style={css.addBtn(EVAL_COLORS[selectedEval]?.accent)}
                  onClick={() => { setEditingRecord(null); setView("eval-form"); }}>
                  <IcoPlus /> 새 기록
                </button>
              </div>
              {getRecords(selectedPatient.id, selectedEval).length === 0 ? (
                <div style={css.emptyState}>
                  아직 기록이 없습니다.<br />
                  <span style={{ color: "#94a3b8", fontSize: "13px" }}>새 기록 버튼을 눌러 시작하세요.</span>
                </div>
              ) : (
                <div style={css.recordList}>
                  {getRecords(selectedPatient.id, selectedEval).map(rec => {
                    const col = EVAL_COLORS[selectedEval];
                    return (
                      <div key={rec.id} style={css.recordCard(col.accent)}>
                        <div style={{ display: "flex", flexDirection: "column", gap: "3px" }}>
                          <span style={css.recordDate(col.accent)}>검사일: {rec.data?.date || "미기재"}</span>
                          <span style={css.recordSaved}>{new Date(rec.savedAt).toLocaleString("ko-KR")}</span>
                        </div>
                        <div style={css.recordActions}>
                          <button style={css.editRecBtn(col.accent)}
                            onClick={() => { setEditingRecord(rec); setView("eval-form"); }}>열람/수정</button>
                          <button style={css.deleteRecBtn}
                            onClick={() => deleteRecord(selectedPatient.id, selectedEval, rec.id)}>
                            <IcoTrash />
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          )}

          {/* ── 평가 서식 ── */}
          {view === "eval-form" && selectedPatient && selectedEval && (
            <EvalForm
              template={db.templates[selectedEval]}
              evalKey={selectedEval}
              col={EVAL_COLORS[selectedEval]}
              initialData={editingRecord?.data || null}
              recordId={editingRecord?.id ?? null}
              css={css}
              onSave={formData => {
                saveRecord(selectedPatient.id, selectedEval, formData, editingRecord?.id ?? null);
                setEditingRecord(null);
                setView("eval-history");
              }}
              onCancel={() => { setEditingRecord(null); setView("eval-history"); }}
            />
          )}

          {/* ── 서식 편집 ── */}
          {view === "template-editor" && (
            <div style={css.container}>
              <p style={css.sectionLabel}>서식 편집 (JSON)</p>
              <p style={{ fontSize: "12px", color: "#64748b", marginBottom: "12px" }}>각 평가 항목 구조를 직접 수정할 수 있습니다.</p>
              {templateError && <div style={css.errorBox}>{templateError}</div>}
              <textarea style={css.templateTextarea} value={templateJson}
                onChange={e => setTemplateJson(e.target.value)} spellCheck={false} />
              <div style={{ ...css.formActions, marginTop: "12px" }}>
                <button style={css.saveBtn()} onClick={() => {
                  try {
                    const parsed = JSON.parse(templateJson);
                    persist({ ...db, templates: parsed });
                    setView("list"); setTemplateError("");
                  } catch(e) { setTemplateError("JSON 오류: " + e.message); }
                }}>저장</button>
                <button style={css.cancelFormBtn} onClick={() => setView("list")}>취소</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // ── 평가 서식 컴포넌트 ───────────────────────────────────────
    function EvalForm({ template, evalKey, col, initialData, recordId, css, onSave, onCancel }) {
      const todayStr = new Date().toISOString().slice(0, 10);

      const [formData, setFormData] = useState(() => {
        if (initialData) return JSON.parse(JSON.stringify(initialData));
        const init = {};
        (template?.fields || []).forEach(f => {
          if (f.type === "table") {
            init[f.id] = f.rows.map(row => ({ left: "", right: row.length >= 3 ? "" : undefined, score: row.length < 3 ? "" : undefined }));
          } else if (f.type === "date") {
            init[f.id] = todayStr;
          } else if (f.type === "toggle") {
            init[f.id] = f.options?.[f.options.length - 1] || "";
          } else if (f.type === "fac_select") {
            init[f.id] = "";
          } else {
            init[f.id] = "";
          }
        });
        return init;
      });

      const setField = (id, val) => setFormData(prev => ({ ...prev, [id]: val }));
      const setTableCell = (tableId, rowIdx, colKey, val) => {
        setFormData(prev => {
          const arr = [...(prev[tableId] || [])];
          arr[rowIdx] = { ...arr[rowIdx], [colKey]: val };
          return { ...prev, [tableId]: arr };
        });
      };

      return (
        <div style={css.container}>
          <div style={css.formCard}>
            {(template?.fields || []).map(field => {

              // FAC 선택 UI
              if (field.type === "fac_select") {
                const selected = formData[field.id] ?? "";
                return (
                  <div key={field.id} style={css.fieldRow}>
                    <label style={css.fieldLabel}>{field.label}</label>
                    <div style={css.facTable}>
                      {field.rows.map(([val, desc]) => {
                        const isSel = selected === val;
                        return (
                          <div key={val}
                            style={css.facRow(isSel, col.accent, col.bg, Number(val) % 2 === 0)}
                            onClick={() => { setField(field.id, val); if (field.linkedTo) setField(field.linkedTo, val); }}>
                            <span style={css.facBadge(isSel, col.accent, col.bg)}>{val}</span>
                            <span style={{ fontSize: "13px" }}>{desc}</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              }

              // 테이블 UI
              if (field.type === "table") {
                const tableData = formData[field.id] || [];
                const hasTwoInputs = field.headers.length >= 4;
                const hasOneInput = field.headers.length === 3;
                return (
                  <div key={field.id} style={css.tableSection}>
                    <div style={{ overflowX: "auto" }}>
                      <table style={{ ...css.table, marginBottom: 0 }}>
                        <thead>
                          <tr>{field.headers.map((h, i) => <th key={i} style={css.th}>{h}</th>)}</tr>
                        </thead>
                        <tbody>
                          {field.rows.map((row, ri) => (
                            <tr key={ri} style={{ background: ri % 2 === 0 ? "#fafbfc" : "white" }}>
                              {row.map((cell, ci) => <td key={ci} style={css.td}>{cell}</td>)}
                              {hasTwoInputs && (
                                <>
                                  <td style={css.td}><input style={css.cellInput} value={tableData[ri]?.left ?? ""} onChange={e => setTableCell(field.id, ri, "left", e.target.value)} /></td>
                                  <td style={css.td}><input style={css.cellInput} value={tableData[ri]?.right ?? ""} onChange={e => setTableCell(field.id, ri, "right", e.target.value)} /></td>
                                </>
                              )}
                              {hasOneInput && !hasTwoInputs && (
                                <td style={css.td}><input style={css.cellInput} value={tableData[ri]?.score ?? ""} onChange={e => setTableCell(field.id, ri, "score", e.target.value)} /></td>
                              )}
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                );
              }

              // 일반 필드
              return (
                <div key={field.id} style={css.fieldRow}>
                  <label style={css.fieldLabel}>{field.label}</label>
                  {field.type === "toggle" ? (
                    <div style={css.toggleGroup}>
                      {field.options.map(opt => (
                        <button key={opt} style={css.toggleBtn(formData[field.id] === opt, col.accent)}
                          onClick={() => setField(field.id, opt)}>{opt}</button>
                      ))}
                    </div>
                  ) : field.type === "textarea" ? (
                    <textarea style={css.textarea} placeholder={field.placeholder}
                      value={formData[field.id] || ""} onChange={e => setField(field.id, e.target.value)} />
                  ) : (
                    <input style={css.input} type={field.type || "text"} placeholder={field.placeholder}
                      value={formData[field.id] || ""} onChange={e => setField(field.id, e.target.value)} />
                  )}
                </div>
              );
            })}
          </div>
          <div style={css.formActions}>
            <button style={css.saveBtn(col.accent)} onClick={() => onSave(formData)}>저장</button>
            <button style={css.cancelFormBtn} onClick={onCancel}>취소</button>
          </div>
        </div>
      );
    }

    // ── 마운트 ─────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <!-- Service Worker 등록 (PWA 오프라인 지원) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // 인라인 SW: 캐시 전략
        const swCode = `
          const CACHE = 'pt-eval-v1';
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
            self.skipWaiting();
          });
          self.addEventListener('fetch', e => {
            e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(() => {});
      });
    }
  </script>
</body>
</html>

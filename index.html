  <script>
    // 파일 수정 시각을 버전으로 자동 감지 - 숫자 바꿀 필요 없음
    fetch(location.href, {method:'HEAD', cache:'no-cache'})
      .then(res => {
        const lastMod = res.headers.get('last-modified') || res.headers.get('etag') || '';
        const saved = localStorage.getItem('app_file_version');
        if(saved && saved !== lastMod && lastMod){
          localStorage.setItem('app_file_version', lastMod);
          // 캐시만 삭제, 로컬스토리지 데이터는 절대 건드리지 않음
          if('caches' in window) caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
          if('serviceWorker' in navigator)
            navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
          // reload 전 데이터 백업 확인
          const data = localStorage.getItem('pt_eval_data');
          if(data) localStorage.setItem('pt_eval_data_backup', data);
          window.location.reload();
        } else {
          if(lastMod) localStorage.setItem('app_file_version', lastMod);
        }
      }).catch(()=>{});
  </script>

function loadData(){
  try{
    const r=localStorage.getItem("pt_eval_data");
    if(r){
      const d=JSON.parse(r);
      // patients, records는 반드시 보존, templates만 DEFAULT로 병합
      return{
        patients: d.patients||[],
        records: d.records||{},
        templates: DEFAULT_TEMPLATES
      };
    }
  }catch(e){
    // 파싱 오류 시 백업 키에서 복구 시도
    try{
      const backup=localStorage.getItem("pt_eval_data_backup");
      if(backup){
        const d=JSON.parse(backup);
        return{patients:d.patients||[],records:d.records||{},templates:DEFAULT_TEMPLATES};
      }
    }catch{}
  }
  return{patients:[],records:{},templates:DEFAULT_TEMPLATES};
}
function saveData(d){
  const payload=JSON.stringify(d);
  localStorage.setItem("pt_eval_data",payload);
  // 백업 키에도 동시 저장 (복구용)
  localStorage.setItem("pt_eval_data_backup",payload);
}

function useIsTablet(){
  const [v,setV]=useState(window.innerWidth>=768);
  useEffect(()=>{ const fn=()=>setV(window.innerWidth>=768); window.addEventListener("resize",fn); return()=>window.removeEventListener("resize",fn); },[]);
  return v;
}

  input:{border:"1.5px solid #e2e8f0",borderRadius:"8px",padding:"10px 12px",outline:"none",color:"#1e293b",width:"100%",maxWidth:"320px",fontSize:"16px"},
  inputAuto:{border:"1.5px solid #bfdbfe",borderRadius:"8px",padding:"10px 12px",outline:"none",color:"#2563eb",width:"100%",maxWidth:"320px",fontSize:"16px",background:"#eff6ff",fontWeight:600},
  textarea:{border:"1.5px solid #e2e8f0",borderRadius:"8px",padding:"10px 12px",outline:"none",color:"#1e293b",minHeight:"80px",resize:"vertical",width:"100%",fontSize:"16px"},
  tblSection:{marginBottom:"16px",borderRadius:"8px",overflow:"hidden",border:"1.5px solid #e2e8f0"},
  cellInput:{border:"1.5px solid #e2e8f0",borderRadius:"5px",padding:"5px 4px",fontSize:"14px",width:"58px",outline:"none",textAlign:"center",color:"#1e293b"},
  errorBox:{background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:"8px",padding:"10px 14px",color:"#dc2626",fontSize:"12px",marginBottom:"12px"},
};

const IcoPencil=()=><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;

function PatientListPanel({db,persist,selectedPatient,onSelect,useConfirm}){
  const [search,setSearch]=useState("");
  const [addMode,setAddMode]=useState(false);
  const [newId,setNewId]=useState("");
  const [newName,setNewName]=useState("");
  const [editPt,setEditPt]=useState(null);
  const [editId,setEditId]=useState("");
  const [editName,setEditName]=useState("");
  const [backupMsg,setBackupMsg]=useState("");
  const fileInputRef=React.useRef(null);

  const exportBackup=async()=>{
    const json=JSON.stringify({version:1,exportedAt:new Date().toISOString(),data:db},null,2);
    const fname=`환자평가_백업_${new Date().toISOString().slice(0,10)}.json`;

    // 방법1: Blob URL 다운로드 (PC, 안드로이드 크롬 → 다운로드 폴더 직접 저장)
    try{
      const blob=new Blob([json],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;
      a.download=fname;
      a.style.display="none";
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},1000);
      setBackupMsg(`✅ "${fname}" 이름으로 다운로드 폴더에 저장됐어요.`);
      setTimeout(()=>setBackupMsg(""),4000);
      return;
    }catch(e){}

    // 방법2: Web Share API (iOS Safari - Blob 다운로드 미지원)
    try{
      const blob=new Blob([json],{type:"application/json"});
      const file=new File([blob],fname,{type:"application/json"});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({title:"환자평가 백업",files:[file]});
        setBackupMsg(`✅ "${fname}" 공유 완료. 파일 앱에서 확인하세요.`);
        setTimeout(()=>setBackupMsg(""),4000);
        return;
      }
    }catch(e){ if(e.name==="AbortError") return; }

    // 방법3: 클립보드 복사 (최후 수단)
    try{
      await navigator.clipboard.writeText(json);
      setBackupMsg("📋 데이터가 클립보드에 복사됐어요. 메모 앱에 붙여넣기 후 .json으로 저장하세요.");
      setTimeout(()=>setBackupMsg(""),6000);
    }catch(e){
      setBackupMsg("❌ 저장 실패. 브라우저가 다운로드를 지원하지 않아요.");
      setTimeout(()=>setBackupMsg(""),4000);
    }
  };

  const importBackup=async(e)=>{
    const file=e.target.files?.[0];
    if(!file) return;
    e.target.value="";
    try{
      const text=await file.text();
      const parsed=JSON.parse(text);
      const imported=parsed.version===1?parsed.data:parsed;
      if(!imported.patients||!imported.records) throw new Error("형식 오류");
      const ok=await useConfirm(`백업 파일에서 환자 ${imported.patients.length}명의 데이터를 불러옵니다.
현재 데이터와 병합됩니다. 계속하시겠습니까?`);
      if(!ok) return;
      // 병합: 기존 + 새 데이터 (중복 ID는 백업 데이터 우선)
      const mergedPatients=[...db.patients];
      imported.patients.forEach(p=>{
        if(!mergedPatients.find(e=>e.id===p.id)) mergedPatients.push(p);
      });
      const mergedRecords={...db.records};
      Object.keys(imported.records||{}).forEach(pid=>{
        if(!mergedRecords[pid]) mergedRecords[pid]={};
        Object.keys(imported.records[pid]).forEach(k=>{
          if(!mergedRecords[pid][k]) mergedRecords[pid][k]=[];
          const existing=new Set(mergedRecords[pid][k].map(r=>r.id));
          imported.records[pid][k].forEach(r=>{ if(!existing.has(r.id)) mergedRecords[pid][k].push(r); });
        });
      });
      persist({...db,patients:mergedPatients,records:mergedRecords});
      setBackupMsg(`✅ ${imported.patients.length}명 데이터 복원 완료!`);
      setTimeout(()=>setBackupMsg(""),4000);
    }catch(err){
      setBackupMsg("❌ 파일을 읽을 수 없어요. 올바른 백업 파일인지 확인해 주세요.");
      setTimeout(()=>setBackupMsg(""),4000);
    }
  };

  const genId=()=>{
    let n=1;
    while(db.patients.find(p=>p.id==="새ID"+n)) n++;
    return "새ID"+n;
  };
  const genName=()=>{
    let n=1;
    while(db.patients.find(p=>p.name==="새 환자"+n)) n++;
    return "새 환자"+n;
  };
  const addPt=()=>{
    const id=(newId.trim()||genId());
    const name=(newName.trim()||genName());
    if(db.patients.find(p=>p.id===id)){alert("이미 존재하는 환자 ID입니다.");return;}
    persist({...db,patients:[...db.patients,{id,name}]});
    setNewId("");setNewName("");setAddMode(false);
  };
  const quickAdd=()=>{
    const id=genId();
    const name=genName();
    const newPt={id,name};
    const newDb={...db,patients:[...db.patients,newPt]};
    persist(newDb);
    onSelect(newPt);
  };
  const delPt=async(id)=>{
    const pt=db.patients.find(p=>p.id===id);
    const ok=await useConfirm(`"${pt?.name||id}"님이 명단에서 삭제되며 모든 평가 기록이 사라집니다.\n삭제하시겠습니까?`);
    if(!ok) return;
    const rec={...db.records};delete rec[id];
    persist({...db,patients:db.patients.filter(p=>p.id!==id),records:rec});
  };
  const startEdit=(p,e)=>{
    e.stopPropagation();
    setEditPt(p);
    setEditId(p.id);
    setEditName(p.name);
    setAddMode(false);
  };
  const saveEdit=()=>{
    if(!editId.trim()||!editName.trim()) return;
    const oldId=editPt.id;
    const newIdVal=editId.trim();
    if(newIdVal!==oldId&&db.patients.find(p=>p.id===newIdVal)){alert("이미 존재하는 환자 ID입니다.");return;}
    // ID가 바뀌면 records 키도 이전
    const newPatients=db.patients.map(p=>p.id===oldId?{id:newIdVal,name:editName.trim()}:p);
    const newRecords={...db.records};
    if(newIdVal!==oldId){
      newRecords[newIdVal]=newRecords[oldId]||{};
      delete newRecords[oldId];
    }
    persist({...db,patients:newPatients,records:newRecords});
    setEditPt(null);
  };

  const filtered=db.patients.filter(p=>p.id.includes(search)||p.name.includes(search));
  const inputStyle={border:"1.5px solid #e2e8f0",borderRadius:"7px",padding:"8px 10px",outline:"none",color:"#1e293b",fontSize:"15px",width:"100%"};

  return(
    <div className="panel-scroll"><div className="pad-sm">
      <button style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:"7px",background:"#2563eb",color:"#fff",border:"none",borderRadius:"11px",padding:"13px",fontSize:"15px",fontWeight:700,cursor:"pointer",marginBottom:"10px",boxShadow:"0 2px 8px rgba(37,99,235,0.18)"}} onClick={quickAdd}>
        <IcoPlus/> 새 환자 평가
      </button>
      <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
        <div style={{flex:1,display:"flex",alignItems:"center",gap:"7px",background:"#f8fafc",border:"1.5px solid #e2e8f0",borderRadius:"10px",padding:"8px 10px"}}>
          <IcoSearch/><input style={{border:"none",outline:"none",fontSize:"14px",color:"#334155",width:"100%",background:"transparent"}} placeholder="ID 또는 이름 검색" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <button style={{display:"flex",alignItems:"center",gap:"4px",background:"#f1f5f9",color:"#475569",border:"1.5px solid #e2e8f0",borderRadius:"10px",padding:"8px 12px",fontSize:"12px",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}} onClick={()=>{setAddMode(true);setEditPt(null);}}><IcoPlus/> 등록</button>
      </div>

      {/* 신규 추가 폼 */}
      {addMode&&(
        <div style={{display:"flex",flexDirection:"column",gap:"7px",marginBottom:"10px",background:"#fff",border:"1.5px solid #2563eb",borderRadius:"10px",padding:"12px"}}>
          <div style={{fontSize:"11px",fontWeight:700,color:"#2563eb",marginBottom:"2px"}}>새 환자 등록</div>
          <input style={inputStyle} inputMode="numeric" placeholder="환자 ID (선택사항)" value={newId} onChange={e=>setNewId(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPt()}/>
          <input style={inputStyle} placeholder="이름 (선택사항)" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPt()}/>
          <div style={{display:"flex",gap:"7px"}}>
            <button style={{flex:1,background:"#2563eb",color:"#fff",border:"none",borderRadius:"7px",padding:"9px",fontSize:"14px",fontWeight:600,cursor:"pointer"}} onClick={addPt}>저장</button>
            <button style={{flex:1,background:"#f1f5f9",color:"#475569",border:"none",borderRadius:"7px",padding:"9px",fontSize:"14px",cursor:"pointer"}} onClick={()=>{setAddMode(false);setNewId("");setNewName("");}}>취소</button>
          </div>
        </div>
      )}

      {/* 수정 폼 */}
      {editPt&&(
        <div style={{display:"flex",flexDirection:"column",gap:"7px",marginBottom:"10px",background:"#fff",border:"1.5px solid #f59e0b",borderRadius:"10px",padding:"12px"}}>
          <div style={{fontSize:"11px",fontWeight:700,color:"#b45309",marginBottom:"2px"}}>환자 정보 수정</div>
          <input style={{...inputStyle,borderColor:"#fcd34d"}} inputMode="numeric" placeholder="환자 ID" value={editId} onChange={e=>setEditId(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit()}/>
          <input style={{...inputStyle,borderColor:"#fcd34d"}} placeholder="이름" value={editName} onChange={e=>setEditName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveEdit()}/>
          <div style={{display:"flex",gap:"7px"}}>
            <button style={{flex:1,background:"#f59e0b",color:"#fff",border:"none",borderRadius:"7px",padding:"9px",fontSize:"14px",fontWeight:600,cursor:"pointer"}} onClick={saveEdit}>저장</button>
            <button style={{flex:1,background:"#f1f5f9",color:"#475569",border:"none",borderRadius:"7px",padding:"9px",fontSize:"14px",cursor:"pointer"}} onClick={()=>setEditPt(null)}>취소</button>
          </div>
        </div>
      )}

      <div style={{background:"#fff",borderRadius:"12px",overflow:"hidden",border:"1.5px solid #e2e8f0",boxShadow:"0 2px 6px rgba(0,0,0,0.04)"}}>
        {filtered.length===0?(
          <div style={{padding:"32px",textAlign:"center",color:"#94a3b8",fontSize:"13px"}}>{search?"검색 결과 없음":"등록된 환자가 없습니다."}</div>
        ):filtered.map(p=>{
          const total=EVAL_KEYS.reduce((s,k)=>s+(db.records[p.id]?.[k]?.length||0),0);
          const isSel=selectedPatient?.id===p.id;
          const isEditing=editPt?.id===p.id;
          return(
            <div key={p.id} className="pt-row" style={{padding:"11px 12px",borderBottom:"1px solid #f1f5f9",display:"flex",alignItems:"center",justifyContent:"space-between",background:isEditing?"#fffbeb":isSel?"#eff6ff":"white"}} onClick={()=>onSelect(p)}>
              <div style={{minWidth:0}}>
                <div style={{fontFamily:"monospace",color:"#2563eb",fontSize:"12px",marginBottom:"1px"}}>{p.id}</div>
                <div style={{fontWeight:600,fontSize:"14px",color:"#1e293b"}}>{p.name}</div>
                <div style={{fontSize:"11px",color:"#94a3b8",marginTop:"1px"}}>{total}건의 기록</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"6px",flexShrink:0}}>
                {isSel&&!isEditing&&<div style={{width:"6px",height:"6px",borderRadius:"50%",background:"#2563eb"}}/>}
                <button style={{background:"none",border:"1px solid #fcd34d",borderRadius:"6px",padding:"4px 7px",cursor:"pointer",color:"#b45309",display:"inline-flex",alignItems:"center"}} onClick={e=>startEdit(p,e)}><IcoPencil/></button>
                <button style={S.delBtn} onClick={e=>{e.stopPropagation();delPt(p.id);}}><IcoTrash/></button>
              </div>
            </div>
          );
        })}
      </div>

      {/* 전체 삭제 */}
      {db.patients.length>0&&(
        <div style={{marginTop:"14px"}}>
          <button onClick={async()=>{
            const ok=await useConfirm(`환자 ${db.patients.length}명 전체가 삭제되며 모든 평가 기록이 사라집니다.\n삭제 전 백업을 권장합니다.\n\n정말 전체 삭제하시겠습니까?`);
            if(!ok) return;
            persist({...db,patients:[],records:{}});
          }} style={{width:"100%",background:"#fff",border:"1.5px solid #ef4444",color:"#ef4444",borderRadius:"10px",padding:"10px",fontSize:"13px",fontWeight:600,cursor:"pointer"}}>
            🗑 전체 삭제
          </button>
        </div>
      )}

      {/* 백업/복원 */}
      <div style={{marginTop:"14px",padding:"12px",background:"#f8fafc",borderRadius:"12px",border:"1.5px solid #e2e8f0"}}>
        <div style={{fontSize:"11px",fontWeight:700,color:"#64748b",marginBottom:"8px"}}>📦 데이터 백업 / 복원</div>
        <div style={{display:"flex",gap:"8px"}}>
          <button onClick={exportBackup} style={{flex:1,background:"#fff",border:"1.5px solid #2563eb",color:"#2563eb",borderRadius:"8px",padding:"9px 0",fontSize:"13px",fontWeight:600,cursor:"pointer"}}>⬇ 백업 저장</button>
          <button onClick={()=>fileInputRef.current?.click()} style={{flex:1,background:"#fff",border:"1.5px solid #16a34a",color:"#16a34a",borderRadius:"8px",padding:"9px 0",fontSize:"13px",fontWeight:600,cursor:"pointer"}}>⬆ 백업 불러오기</button>
          <input ref={fileInputRef} type="file" accept="*/*" style={{display:"none"}} onChange={importBackup}/>
        </div>
        {backupMsg&&<div style={{marginTop:"8px",fontSize:"12px",color:"#475569",textAlign:"center"}}>{backupMsg}</div>}
      </div>
    </div></div>
  );
}

// ── 날짜별 한눈에 보기 ───────────────────────────────────────────
function buildPrintHtml(patient, date, items, templates){
  const colMap=EVAL_COLORS;
  let body="";
  items.forEach(({key,rec})=>{
    const col=colMap[key];
    const tmpl=templates[key];
    if(!tmpl||!rec.data) return;
    body+=`<div style="border:1.5px solid ${col.border};border-radius:10px;margin-bottom:16px;overflow:hidden;page-break-inside:avoid;">
      <div style="background:${col.bg};padding:8px 14px;border-bottom:1px solid ${col.border};">
        <span style="font-size:14px;font-weight:800;color:${col.accent};">${key}</span>
        <span style="font-size:12px;color:${col.text};margin-left:6px;">${tmpl.label||""}</span>
      </div>
      <div style="padding:12px 14px;font-size:13px;color:#334155;">`;

    tmpl.fields.filter(f=>f.id!=="date").forEach(field=>{
      const val=rec.data[field.id];
      if(field.type==="fac_select"){
        const score=rec.data["score"]??"";
        const row=field.rows.find(([v])=>v===String(score));
        body+=`<div style="margin-bottom:8px;"><strong style="color:${col.accent};">FAC ${score}점</strong>`;
        if(row) body+=`<div style="margin-top:4px;background:${col.bg};padding:6px 10px;border-radius:6px;font-size:12px;white-space:pre-line;">${row[1]}</div>`;
        body+=`</div>`;
      } else if(field.id==="score"&&key==="FAC"){
        // skip
      } else if(field.type==="rom_table"){
        const romData=val||{};
        ROM_SECTIONS.forEach((sec,si)=>{
          body+=`<div style="margin-bottom:8px;"><table style="width:100%;border-collapse:collapse;font-size:11px;">
            <thead><tr>
              <th style="background:#e8f4fd;padding:5px;border:1px solid #e2e8f0;width:30%;text-align:center;">Right</th>
              <th style="padding:5px;border:1px solid #e2e8f0;text-align:center;font-weight:700;">${sec.title}</th>
              <th style="background:#e8f4fd;padding:5px;border:1px solid #e2e8f0;width:30%;text-align:center;">Left</th>
            </tr></thead><tbody>`;
          sec.rows.forEach((row,ri)=>{
            const k2=si+"_"+ri;
            const r=romData[k2]?.right||"—"; const l=romData[k2]?.left||"—";
            body+=`<tr style="background:${ri%2===0?"#fafbfc":"white"}">
              <td style="text-align:center;padding:5px;border:1px solid #f1f5f9;font-weight:600;color:#3daa5c;">${r}</td>
              <td style="text-align:center;padding:5px;border:1px solid #f1f5f9;font-size:11px;color:#475569;">${row}</td>
              <td style="text-align:center;padding:5px;border:1px solid #f1f5f9;font-weight:600;color:#3daa5c;">${l}</td>
            </tr>`;
          });
          body+=`</tbody></table></div>`;
        });
      } else if(field.type==="mmt_sections"){
        const md=val||{};
        MMT_SECTIONS.forEach((grp,gi)=>{
          body+=`<div style="margin-bottom:8px;"><div style="font-size:11px;font-weight:800;background:#fef3e2;padding:5px 10px;border-radius:6px 6px 0 0;border:1px solid #e8961e;color:#7a4d0a;">${grp.group}</div>
            <table style="width:100%;border-collapse:collapse;font-size:11px;border:1px solid #e8961e;border-top:none;border-radius:0 0 6px 6px;overflow:hidden;">`;
          grp.sections.forEach((sec,si)=>{
            body+=`<thead><tr><th style="background:#fef9f0;padding:5px;border:1px solid #e8961e;color:#7a4d0a;">${sec.title}</th><th style="padding:5px;border:1px solid #e8961e;text-align:center;">Right</th><th style="padding:5px;border:1px solid #e8961e;text-align:center;">Left</th></tr></thead><tbody>`;
            sec.rows.forEach((row,ri)=>{
              const k2=gi+"_"+si+"_"+ri;
              body+=`<tr style="background:${ri%2===0?"#fafbfc":"white"}">
                <td style="padding:5px;border:1px solid #f1f5f9;padding-left:14px;">${row}</td>
                <td style="text-align:center;padding:5px;border:1px solid #f1f5f9;font-weight:600;color:#e8961e;">${md[k2]?.right||"—"}</td>
                <td style="text-align:center;padding:5px;border:1px solid #f1f5f9;font-weight:600;color:#e8961e;">${md[k2]?.left||"—"}</td>
              </tr>`;
            });
            body+=`</tbody>`;
          });
          body+=`</table></div>`;
        });
      } else if(field.type==="bbs_full"){
        const scores=val||[];
        const total=rec.data.bbs_total??scores.reduce((s,v)=>s+(typeof v==="number"?v:parseInt(v)||0),0);
        body+=`<div style="background:#f3eeff;padding:8px 12px;border-radius:8px;border:1.5px solid #8b5cf6;margin-bottom:8px;">
          <span style="font-weight:700;color:#4c1d95;font-size:13px;">BBS 총점 </span>
          <span style="font-size:20px;font-weight:800;color:#8b5cf6;">${total}</span>
          <span style="color:#94a3b8;font-size:12px;"> / 56</span>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;">`;
        BBS_ITEMS.forEach((item,ri)=>{
          const s=scores[ri];
          body+=`<span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#f3eeff;color:#8b5cf6;font-weight:600;">${ri+1}: ${s!==null&&s!==undefined?s+"점":"—"}</span>`;
        });
        body+=`</div>`;
      } else if(field.type==="fga_full"){
        const scores=val||[];
        const total=rec.data.fga_total??scores.reduce((s,v)=>s+(typeof v==="number"?v:parseInt(v)||0),0);
        body+=`<div style="background:#f0fdf4;padding:8px 12px;border-radius:8px;border:1.5px solid #16a34a;margin-bottom:8px;">
          <span style="font-weight:700;color:#14532d;font-size:13px;">FGA 총점 </span>
          <span style="font-size:20px;font-weight:800;color:#16a34a;">${total}</span>
          <span style="color:#94a3b8;font-size:12px;"> / 30</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;margin-bottom:4px;">`;
        FGA_ITEMS.forEach((item,ri)=>{
          const s=scores[ri];
          const opt=s!==null&&s!==undefined?item.opts.find(([v])=>v===s):null;
          const grade=opt?opt[1].split(" - ")[0]:"미선택";
          body+=`<div style="font-size:11px;padding:4px 10px;border-radius:6px;background:#f0fdf4;border:1px solid #bbf7d0;">
            <span style="font-weight:700;color:#16a34a;margin-right:6px;">${ri+1}. ${s}점</span>
            <span style="color:#334155;">${grade}</span>
          </div>`;
        });
        body+=`</div>`;
      } else if(field.type==="fogq_full"){
        const scores=val||[];
        const total=rec.data.fogq_total??scores.reduce((s,v)=>s+(typeof v==="number"?v:parseInt(v)||0),0);
        body+=`<div style="background:#fef3f2;padding:8px 12px;border-radius:8px;border:1.5px solid #f97316;margin-bottom:8px;">
          <span style="font-weight:700;color:#7c2d12;font-size:13px;">FOG-Q 총점 </span>
          <span style="font-size:20px;font-weight:800;color:#f97316;">${total}</span>
          <span style="color:#94a3b8;font-size:12px;"> / 24</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;margin-bottom:4px;">`;
        FOGQ_ITEMS.forEach((item,ri)=>{
          const s=scores[ri];
          const opt=s!==null&&s!==undefined?item.opts.find(([v])=>v===s):null;
          body+=`<div style="font-size:11px;padding:4px 10px;border-radius:6px;background:#fef3f2;border:1px solid #fed7aa;">
            <span style="font-weight:700;color:#f97316;margin-right:6px;">${ri+1}. ${s!==null&&s!==undefined?s+"점":"미선택"}</span>
            <span style="color:#334155;">${opt?opt[1]:"—"}</span>
          </div>`;
        });
        body+=`</div>`;
      } else if(field.type==="toggle"||field.type==="number"||field.type==="number_auto"||field.type==="text"){
        if(val||val===0) body+=`<div style="margin-bottom:4px;"><span style="color:#94a3b8;font-size:11px;min-width:80px;display:inline-block;">${field.label}</span><span style="font-weight:600;">${val}</span></div>`;
      } else if(field.type==="textarea"&&val){
        body+=`<div style="font-size:12px;color:#64748b;background:#f8fafc;padding:6px 10px;border-radius:6px;border:1px solid #e2e8f0;">${val}</div>`;
      }
    });
    body+=`</div></div>`;
  });

  return `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"/>
    <title>${patient.name} - ${date} 평가기록</title>
    <style>
      *{box-sizing:border-box;margin:0;padding:0;}
      body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;padding:20px;color:#1e293b;font-size:13px;}
      @media print{body{padding:10px;}@page{margin:15mm;}}
    </style>
  </head><body>
    <div style="margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #1e293b;">
      <div style="font-size:18px;font-weight:800;color:#1e293b;">${patient.name} <span style="font-size:13px;color:#2563eb;font-family:monospace;">(${patient.id})</span></div>
      <div style="font-size:14px;color:#475569;margin-top:4px;">검사일: ${date}</div>
    </div>
    ${body}
  </body></html>`;
}

function DateSummaryView({db,persist,patient,templates,onEditForm}){
  const pid=patient.id;
  const allRecs=db.records[pid]||{};

  const dateMap={};
  EVAL_KEYS.forEach(k=>{
    (allRecs[k]||[]).forEach(rec=>{
      const d=rec.data?.date||"날짜 미기재";
      if(!dateMap[d])dateMap[d]=[];
      dateMap[d].push({key:k,rec});
    });
  });
  const dates=Object.keys(dateMap).sort((a,b)=>b.localeCompare(a));
  const [openDate,setOpenDate]=useState(dates[0]||null);

  const shareDate=async(d,items)=>{
    const html=buildPrintHtml(patient,d,items,templates);
    const blob=new Blob([html],{type:"text/html"});
    const file=new File([blob],`${patient.name}_${d}_평가기록.html`,{type:"text/html"});
    if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
      try{ await navigator.share({title:`${patient.name} ${d} 평가기록`,files:[file]}); return; }catch(e){ if(e.name==="AbortError") return; }
    }
    // fallback: 다운로드
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`${patient.name}_${d}_평가기록.html`;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);document.body.removeChild(a);},1000);
  };

  if(dates.length===0) return(
    <div style={{background:"#fff",border:"1.5px dashed #cbd5e1",borderRadius:"12px",padding:"36px 20px",textAlign:"center",color:"#475569",lineHeight:2.2}}>
      아직 저장된 기록이 없습니다.<br/><span style={{color:"#94a3b8",fontSize:"12px"}}>항목별 탭에서 기록을 추가하세요.</span>
    </div>
  );

  const IcoShare=()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>;

  return(
    <div>
      {dates.map(d=>{
        const items=dateMap[d].sort((a,b)=>EVAL_KEYS.indexOf(a.key)-EVAL_KEYS.indexOf(b.key));
        const isOpen=openDate===d;
        return(
          <div key={d} style={{marginBottom:"12px"}}>
            {/* 날짜 헤더 */}
            <div style={{display:"flex",alignItems:"stretch",borderRadius:isOpen?"10px 10px 0 0":"10px",border:"1.5px solid #e2e8f0",overflow:"hidden"}}>
              {/* 클릭 영역 */}
              <div onClick={()=>setOpenDate(isOpen?null:d)}
                style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",justifyContent:"center",padding:"10px 12px",background:"#fff",cursor:"pointer",userSelect:"none",gap:"5px"}}>
                {/* 첫째줄: 날짜 + 펼치기 */}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontSize:"14px",fontWeight:700,color:"#1e293b"}}>{d}</span>
                  <div style={{display:"flex",alignItems:"center",gap:"4px",flexShrink:0}}>
                    <span style={{fontSize:"10px",color:"#94a3b8",fontWeight:500}}>{isOpen?"접기":"펼치기"}</span>
                    <span style={{color:"#cbd5e1",fontSize:"16px",lineHeight:1}}>{isOpen?"▲":"▼"}</span>
                  </div>
                </div>
                {/* 둘째줄: 시간 + 배지들 (wrap) */}
                <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:"4px"}}>
                  {(()=>{
                    const times=items.map(({rec})=>rec.savedAt).filter(Boolean).sort((a,b)=>a-b);
                    if(!times.length) return null;
                    const fmt=t=>new Date(t).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
                    const first=fmt(times[0]);
                    const last=fmt(times[times.length-1]);
                    const label=first===last?first:`${first}~${last}`;
                    return <span style={{fontSize:"10px",color:"#94a3b8",fontWeight:400,flexShrink:0,marginRight:"2px"}}>🕐 {label}</span>;
                  })()}
                  {items.map(({key})=>{
                    const col=EVAL_COLORS[key];
                    return <span key={key} style={{fontSize:"10px",fontWeight:700,padding:"2px 7px",borderRadius:"20px",background:col.bg,color:col.accent,border:`1px solid ${col.border}`}}>{key}</span>;
                  })}
                </div>
              </div>
              {/* 공유 버튼 - 항상 우측 고정 */}
              <button onClick={e=>{e.stopPropagation();shareDate(d,items);}}
                style={{flexShrink:0,padding:"0 14px",background:"#f8fafc",border:"none",borderLeft:"1.5px solid #e2e8f0",cursor:"pointer",color:"#475569",display:"flex",alignItems:"center",gap:"5px",fontSize:"12px",fontWeight:600}}>
                <IcoShare/> 공유
              </button>
            </div>

            {/* 펼쳐진 내용 */}
            {isOpen&&(
              <div style={{border:"1.5px solid #e2e8f0",borderTop:"none",borderRadius:"0 0 10px 10px",background:"#f8fafc",padding:"12px"}}>
                {items.map(({key,rec})=>{
                  const col=EVAL_COLORS[key];
                  const tmpl=templates[key];
                  return(
                    <div key={rec.id} style={{background:"#fff",border:`1.5px solid ${col.border}`,borderRadius:"10px",marginBottom:"10px",overflow:"hidden"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 12px",background:col.bg,borderBottom:`1px solid ${col.border}`}}>
                        <div>
                          <span style={{fontSize:"13px",fontWeight:800,color:col.accent}}>{key} <span style={{fontSize:"11px",fontWeight:400,color:col.text}}>{tmpl?.label||""}</span></span>
                          <div style={{fontSize:"11px",color:col.text,marginTop:"2px"}}>🕐 {new Date(rec.savedAt).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}</div>
                        </div>
                        <button style={{background:"none",border:`1.5px solid ${col.accent}`,borderRadius:"7px",padding:"4px 10px",fontSize:"11px",fontWeight:600,cursor:"pointer",color:col.accent}}
                          onClick={()=>onEditForm(key,rec)}>수정</button>
                      </div>
                      <div style={{padding:"10px 12px"}}>
                        <RecordSummary evalKey={key} data={rec.data} col={col} templates={templates}/>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

            <div key={field.id} style={{fontSize:"12px",color:"#64748b",background:"#f8fafc",padding:"7px 10px",borderRadius:"7px",border:"1px solid #e2e8f0"}}>{val}</div>
          );
        }

        return null;
      })}
    </div>
  );
}

function ContentPanel({db,persist,patient,isTablet,onBackToList,goBackRef,useConfirm}){
  const [tab,setTab]=useState("item");   // "item" | "date"
  const [rv,setRv]=useState("eval-select");
  const [ek,setEk]=useState(null);
  const [editRec,setEditRec]=useState(null);
  const [tmplJson,setTmplJson]=useState("");
  const [tmplErr,setTmplErr]=useState("");
  const evalFormDirtyRef=React.useRef(false); // EvalForm의 isDirty를 공유
  const evalFormSaveRef=React.useRef(null);   // EvalForm의 save 함수
  useEffect(()=>{setRv("eval-select");setEk(null);setEditRec(null);setTab("item");evalFormDirtyRef.current=false;},[patient?.id]);

  // 뷰 전환 - React state만으로 관리
  const navTo=(nextRv,opts={})=>{
    if(opts.ek!==undefined) setEk(opts.ek);
    if(opts.editRec!==undefined) setEditRec(opts.editRec);
    if(opts.tab!==undefined) setTab(opts.tab);
    setRv(nextRv);
  };

  // 하드웨어 뒤로가기 핸들러를 ref에 등록
  useEffect(()=>{
    if(!goBackRef) return;

      if(rv==="eval-form"){
        if(evalFormDirtyRef.current){
          const ans=await useConfirm("저장하지 않은 변경사항이 있습니다.\n저장하시겠습니까?");

        evalFormDirtyRef.current=false;
        setEditRec(null);setRv(tab==="date"?"date-view":"eval-history");return true;
      }
      if(rv==="eval-history"){setEk(null);setRv("eval-select");return true;}
      if(rv==="template-editor"){setRv("eval-select");return true;}
      if(rv==="date-view"){setRv("eval-select");return true;}
      if(rv==="eval-select"){onBackToList();return true;}
      return false;
    };
  },[rv,tab,isTablet,goBackRef,onBackToList]);
  const getRecs=(k)=>(db.records[patient?.id]?.[k]||[]).slice().sort((a,b)=>b.savedAt-a.savedAt);
  const saveRec=(k,data,rid)=>{
    const rec={...db.records},pid=patient.id;
    if(!rec[pid])rec[pid]={};if(!rec[pid][k])rec[pid][k]=[];
    if(rid!=null)rec[pid][k]=rec[pid][k].map(r=>r.id===rid?{...r,data,savedAt:Date.now()}:r);
    else rec[pid][k]=[...rec[pid][k],{id:Date.now(),data,savedAt:Date.now()}];
    persist({...db,records:rec});
  };
  const delRec=async(k,rid,date)=>{
    const ok=await useConfirm(`"${date||"미기재"} ${k}" 항목을 삭제하시겠습니까?`);
    if(!ok) return;
    const rec={...db.records};rec[patient.id][k]=rec[patient.id][k].filter(r=>r.id!==rid);persist({...db,records:rec});
  };
  const leaveForm=async(dest,opts={})=>{
    if(evalFormDirtyRef.current){
      const ans=await useConfirm("저장하지 않은 변경사항이 있습니다.\n저장하시겠습니까?");
      if(ans){
        if(evalFormSaveRef.current) evalFormSaveRef.current();
        return;
      }
    }
    evalFormDirtyRef.current=false;
    if(opts.clearRec) setEditRec(null);
    if(opts.clearEk) setEk(null);
    setRv(dest);
  };
  const goBack=()=>{
    if(rv==="eval-form") leaveForm(tab==="date"?"date-view":"eval-history",{clearRec:true});
    else if(rv==="eval-history"){setEk(null);setRv("eval-select");}
    else if(rv==="template-editor")setRv("eval-select");

    if(ek&&rv==="eval-form") return `${base}  ›  ${ek} ${editRec?"수정":"신규"}`;

  // 날짜별 탭에서 수정 버튼 클릭 시

function MmtSelect({value, onChange}){
  const [open,setOpen]=React.useState(false);
  const btnRef=React.useRef(null);
  const [pos,setPos]=React.useState({top:0,left:0});
  // 전역 단일 터치 상태 - React synthetic event와 분리
  const ts=React.useRef({startX:0,startY:0,moved:false,startedInPortal:false});

  const calcPos=()=>{
    if(!btnRef.current) return;
    const r=btnRef.current.getBoundingClientRect();
    setPos({top:r.bottom+window.scrollY+3,left:r.left+window.scrollX+r.width/2});
  };

  useEffect(()=>{
    if(!open){ calcPos(); return; }
    calcPos();

    const getPortal=()=>document.getElementById("mmt-portal");

    const onTouchStart=(e)=>{
      const t=e.touches[0];
      const portal=getPortal();
      ts.current={
        startX:t.clientX, startY:t.clientY,
        moved:false,
        startedInPortal:!!(portal&&portal.contains(e.target))
      };
    };

    const onTouchMove=(e)=>{
      const t=e.touches[0];
      const dx=Math.abs(t.clientX-ts.current.startX);
      const dy=Math.abs(t.clientY-ts.current.startY);
      if(dx>5||dy>5) ts.current.moved=true;
      // 포털 안에서 시작된 터치면 바깥 스크롤 완전 차단
      if(ts.current.startedInPortal) e.preventDefault();
    };

    const onTouchEnd=(e)=>{
      const moved=ts.current.moved;
      const startedInPortal=ts.current.startedInPortal;
      const t=e.changedTouches[0];
      const el=document.elementFromPoint(t.clientX,t.clientY);
      const portal=getPortal();
      const isInPortal=portal&&portal.contains(el);
      const isInBtn=btnRef.current&&btnRef.current.contains(el);

      if(moved){
        // 드래그 → 아무것도 하지 않음 (선택X, 닫기X)
        return;
      }
      if(isInPortal){
        // 포털 안 탭 → 해당 항목 값 찾아서 선택
        const item=el.closest("[data-mmt]");
        if(item){
          e.preventDefault();
          onChange(item.getAttribute("data-mmt-val"));
          setOpen(false);
        }
      } else if(!isInBtn){
        // 포털·버튼 바깥 탭 → 닫기
        setOpen(false);
      }
    };

    // PC: mousedown으로 바깥 닫기만
    const onMouseDown=(e)=>{
      const portal=getPortal();
      if(!portal?.contains(e.target)&&!btnRef.current?.contains(e.target)) setOpen(false);
    };

    document.addEventListener("touchstart",onTouchStart,{passive:true});
    document.addEventListener("touchmove",onTouchMove,{passive:false});
    document.addEventListener("touchend",onTouchEnd,{passive:false});
    document.addEventListener("mousedown",onMouseDown);
    return()=>{
      document.removeEventListener("touchstart",onTouchStart);
      document.removeEventListener("touchmove",onTouchMove);
      document.removeEventListener("touchend",onTouchEnd);
      document.removeEventListener("mousedown",onMouseDown);
    };
  },[open, onChange]);

  const display=value===""?"—":value;

  const dropdown=open&&ReactDOM.createPortal(
    <div
      id="mmt-portal"
      onWheel={e=>e.stopPropagation()}
      style={{position:"absolute",top:pos.top,left:pos.left,transform:"translateX(-50%)",zIndex:9000,background:"#fff",border:"1.5px solid #e2e8f0",borderRadius:"10px",boxShadow:"0 8px 24px rgba(0,0,0,0.18)",overflowY:"auto",overflowX:"hidden",maxHeight:"320px",minWidth:"82px",WebkitOverflowScrolling:"touch"}}>
      {MMT_OPTIONS.map(o=>{
        const on=value===o;
        return(
          <div key={o}
            data-mmt="1"
            data-mmt-val={o}
            onMouseUp={e=>{e.stopPropagation();onChange(o);setOpen(false);}}
            style={{padding:"11px 14px",fontSize:"14px",fontWeight:on?700:400,color:on?"#e8961e":"#1e293b",background:on?"#fef9f0":"#fff",cursor:"pointer",textAlign:"center",borderBottom:"1px solid #f1f5f9",userSelect:"none",WebkitUserSelect:"none"}}>
            {o===""?"—":o}
          </div>
        );
      })}
    </div>,
    document.body
  );

  return(
    <div style={{position:"relative",display:"inline-block"}}>
      <button ref={btnRef}
        onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}
        style={{width:"70px",height:"38px",border:"1.5px solid #e2e8f0",borderRadius:"8px",background:"#fff",color:value===""?"#94a3b8":"#1e293b",fontSize:"14px",fontWeight:value===""?400:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"3px",userSelect:"none",WebkitUserSelect:"none"}}>
        {display}
        <span style={{fontSize:"9px",color:"#94a3b8",marginTop:"1px"}}>{open?"▲":"▼"}</span>
      </button>
      {dropdown}
    </div>
  );
}


function ConfirmDialog({msg, onYes, onNo}){
  if(!msg) return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.45)"}}>
      <div style={{background:"#fff",borderRadius:"14px",padding:"24px 22px",maxWidth:"320px",width:"90%",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
        <div style={{fontSize:"15px",fontWeight:600,color:"#1e293b",marginBottom:"20px",lineHeight:1.6,textAlign:"center"}}>{msg}</div>
        <div style={{display:"flex",gap:"10px"}}>
          <button onClick={onNo} style={{flex:1,padding:"11px",borderRadius:"9px",border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#475569",fontSize:"14px",fontWeight:600,cursor:"pointer"}}>아니오</button>
          <button onClick={onYes} style={{flex:1,padding:"11px",borderRadius:"9px",border:"none",background:"#ef4444",color:"#fff",fontSize:"14px",fontWeight:700,cursor:"pointer"}}>예</button>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [db,setDb]=useState(()=>loadData());
  const [patient,setPatient]=useState(null);
  const [mobileView,setMobileView]=useState("list");
  const isTablet=useIsTablet();
  const contentGoBackRef=React.useRef(null);
  const mobileViewRef=React.useRef("list");
  const setMobileViewSync=(v)=>{mobileViewRef.current=v;setMobileView(v);};
  const persist=nd=>{setDb(nd);saveData(nd);};
  const [confirmState,setConfirmState]=useState({msg:null,onYes:null});
  const useConfirm=(msg)=>new Promise(res=>{
    setConfirmState({msg,onYes:()=>{setConfirmState({msg:null,onYes:null});res(true);},onNo:()=>{setConfirmState({msg:null,onYes:null});res(false);}});
  });
  const selectPatient=p=>{
    setPatient(p);
    if(!isTablet){
      setMobileViewSync("content");
    }
  };
  useEffect(()=>{
    // 단순 전략: guard 하나만 항상 유지
    // 뒤로가기 발생 → guard가 pop됨 → onPop 실행 → 처리 후 guard 다시 push
    history.replaceState({level:"base"},"");
    history.pushState({level:"guard"},"");

    const onPop=async()=>{
      // 항상 guard를 즉시 복구 (종료 방지)
      history.pushState({level:"guard"},"");

      // ContentPanel 뒤로가기 처리 시도
      const handled = contentGoBackRef.current && await contentGoBackRef.current();
      if(handled) return;

      // ContentPanel이 처리 못함
      if(mobileViewRef.current==="content"){
        // 모바일: 콘텐츠 → 목록
        setMobileView("list");
        mobileViewRef.current="list";
        return;
      }

      // 최상위 → 종료 확인
      const exit = await useConfirm("앱을 종료하시겠습니까?");
      if(exit){
        // guard + base 모두 제거 후 실제 종료
        history.go(-2);
      }
    };

    window.addEventListener("popstate",onPop);
    return()=>{
      window.removeEventListener("popstate",onPop);
    };
  },[]);
  return(
    <div className="layout-shell">
      <ConfirmDialog msg={confirmState.msg} onYes={confirmState.onYes} onNo={confirmState.onNo}/>
      <div className="topbar">
        <div style={{display:"flex",alignItems:"center",gap:"6px",minWidth:0,flex:1}}>
          {!isTablet&&mobileView==="content"&&(
            <button onClick={()=>setMobileViewSync("list")} style={{background:"none",border:"none",padding:"6px 6px 6px 0",color:"#475569",cursor:"pointer",display:"flex",alignItems:"center",flexShrink:0}}><IcoBack/></button>
          )}
          {!isTablet&&mobileView==="content"&&patient?(
            <span style={{fontSize:"19px",fontWeight:800,color:"#1e293b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{patient.id} {patient.name}</span>
          ):(
            <span style={{fontSize:"19px",fontWeight:700,color:"#1e293b"}}>환자 평가 관리 <span style={{fontSize:"12px",fontWeight:500,color:"#94a3b8"}}>v2.6</span></span>
          )}
        </div>
      </div>
      <div className="main-area">
        <div className="panel-left" style={!isTablet&&mobileView==="content"?{display:"none"}:{}}>
          <PatientListPanel db={db} persist={persist} selectedPatient={patient} onSelect={selectPatient} useConfirm={useConfirm}/>
        </div>
        <div className="panel-right" style={!isTablet&&mobileView==="list"?{display:"none"}:{display:"block",flex:1,overflow:"hidden"}}>
          <ContentPanel db={db} persist={persist} patient={patient} isTablet={isTablet} onBackToList={()=>setMobileViewSync("list")} goBackRef={contentGoBackRef} useConfirm={useConfirm}/>
        </div>
      </div>
    </div>
  );
}

function EvalForm({template,col,initialData,onSave,onCancel,dirtyRef,saveRef,useConfirm}){
  const todayStr=new Date().toISOString().slice(0,10);
  const buildInit=()=>{
    const init={};
    (template?.fields||[]).forEach(f=>{
      if(f.type==="table") init[f.id]=f.rows.map(row=>({left:"",right:row.length>=3?"":undefined,score:row.length<3?"":undefined}));
      else if(f.type==="mmt_table") init[f.id]=f.rows.map(()=>({left:"",right:""}));
      else if(f.type==="mmt_sections") init[f.id]={};
      else if(f.type==="bbs_full") init[f.id]=BBS_ITEMS.map(()=>null);
      else if(f.type==="fga_full") init[f.id]=FGA_ITEMS.map(()=>null);
      else if(f.type==="fogq_full") init[f.id]=FOGQ_ITEMS.map(()=>null);
      else if(f.type==="rom_table") init[f.id]={};
      else if(f.type==="date") init[f.id]=todayStr;
      else if(f.type==="toggle") init[f.id]=f.options?.[0]||"";
      else init[f.id]="";
    });
    return init;
  };
  const [fd,setFd]=useState(()=>initialData?JSON.parse(JSON.stringify(initialData)):buildInit());
  const [isDirty,setIsDirty]=useState(false);
  const markDirty=()=>{ setIsDirty(true); if(dirtyRef) dirtyRef.current=true; };
  const setF=(id,val)=>{markDirty();setFd(prev=>({...prev,[id]:val}));};
  const setCell=(tid,ri,ck,val)=>{markDirty();setFd(prev=>{const arr=[...(prev[tid]||[])];arr[ri]={...arr[ri],[ck]:val};return{...prev,[tid]:arr};});};
  const setBbs=(ri,score)=>{markDirty();setFd(prev=>{const arr=[...(prev["_bbs"]||BBS_ITEMS.map(()=>null))];arr[ri]=score;return{...prev,"_bbs":arr};});};
  const setFga=(ri,score)=>{markDirty();setFd(prev=>{const arr=[...(prev["_fga"]||FGA_ITEMS.map(()=>null))];arr[ri]=score;return{...prev,"_fga":arr};});};
  const setFogq=(ri,score)=>{markDirty();setFd(prev=>{const arr=[...(prev["_fogq"]||FOGQ_ITEMS.map(()=>null))];arr[ri]=score;return{...prev,"_fogq":arr};});};

  // 타이머 상태: {trial1: {running, startTime, elapsed}, ...}
  const [timers,setTimers]=useState({trial1:{running:false,elapsed:0},trial2:{running:false,elapsed:0},trial3:{running:false,elapsed:0}});
  const timerRefs=React.useRef({});

  const startTimer=(id)=>{
    const startTime=Date.now()-((timers[id]?.elapsed||0)*1000);
    timerRefs.current[id]=setInterval(()=>{
      const elapsed=(Date.now()-startTime)/1000;
      setTimers(prev=>({...prev,[id]:{...prev[id],running:true,elapsed}}));
    },50);
    setTimers(prev=>({...prev,[id]:{...prev[id],running:true}}));
  };

  const stopTimer=(id)=>{
    clearInterval(timerRefs.current[id]);
    setTimers(prev=>{
      const elapsed=prev[id].elapsed;
      const val=elapsed.toFixed(2);
      markDirty();
      setFd(p=>({...p,[id]:val}));
      return {...prev,[id]:{running:false,elapsed}};
    });
  };

  const resetTimer=(id)=>{
    clearInterval(timerRefs.current[id]);
    setTimers(prev=>({...prev,[id]:{running:false,elapsed:0}}));
    setF(id,"");
  };

  useEffect(()=>{
    return()=>{Object.values(timerRefs.current).forEach(t=>clearInterval(t));};
  },[]);

  // 10mWT 자동계산
  useEffect(()=>{
    if(template?.fields?.find(f=>f.id==="avg"&&f.type==="number_auto")){
      const vals=["trial1","trial2","trial3"].map(k=>parseFloat(fd[k])).filter(v=>!isNaN(v));
      if(vals.length>0){
        const avg=(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2);
        const speed=(10/parseFloat(avg)).toFixed(3);
        setFd(prev=>({...prev,avg,speed}));
      } else {
        setFd(prev=>({...prev,avg:"",speed:""}));
      }
    }
  },[fd.trial1,fd.trial2,fd.trial3]);

  const isTestFailure = fd["test_failure"] === "Test failure";
  const FAILURE_DISABLED = ["speed_type","trial1","trial2","trial3","avg","speed","assistive"];

  const handleSave=()=>{
    const final={...fd};
    if(template?.fields?.find(f=>f.type==="bbs_full")){
      final.bbs_total=(fd["_bbs"]||[]).reduce((s,v)=>s+(typeof v==="number"?v:parseInt(v)||0),0);
    }
    if(template?.fields?.find(f=>f.type==="fga_full")){
      final.fga_total=(fd["_fga"]||[]).reduce((s,v)=>s+(typeof v==="number"?v:parseInt(v)||0),0);
    }
    if(template?.fields?.find(f=>f.type==="fogq_full")){
      final.fogq_total=(fd["_fogq"]||[]).reduce((s,v)=>s+(typeof v==="number"?v:parseInt(v)||0),0);
    }
    setIsDirty(false);
    if(dirtyRef) dirtyRef.current=false;
    onSave(final);
  };

  // saveRef에 handleSave 항상 최신으로 등록
  useEffect(()=>{ if(saveRef) saveRef.current=handleSave; },[fd,isDirty]);

  const handleCancel=async()=>{
    if(isDirty){
      const ans=await useConfirm("저장하지 않은 변경사항이 있습니다.\n저장하시겠습니까?");
      if(ans){ handleSave(); return; }
    }
    onCancel();
  };

  return(
    <div>
    {/* 상단 고정 저장 바 */}
    <div style={{position:"sticky",top:0,zIndex:50,background:"#fff",borderBottom:"1.5px solid #e2e8f0",padding:"8px 12px",display:"flex",gap:"8px",boxShadow:"0 2px 6px rgba(0,0,0,0.06)",marginBottom:"8px"}}>
      <button style={{background:"#f1f5f9",color:"#475569",border:"none",borderRadius:"10px",padding:"10px 18px",fontSize:"14px",cursor:"pointer"}} onClick={handleCancel}>취소</button>
      <button style={{flex:1,background:col.accent,color:"#fff",border:"none",borderRadius:"10px",padding:"10px",fontSize:"14px",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px"}}
        onClick={handleSave}>
        {isDirty&&<span style={{width:"7px",height:"7px",borderRadius:"50%",background:"rgba(255,255,255,0.75)",display:"inline-block",flexShrink:0}}/>}
        저장
      </button>
    </div>
    <div style={S.formCard}>
      {(template?.fields||[]).map(field=>{
        const disabled = isTestFailure && FAILURE_DISABLED.includes(field.id);

        if(field.type==="fac_select"){
          const sel=fd[field.id]??"";
          return(
            <div key={field.id} style={S.fieldRow}>
              <label style={S.fieldLabel}>{field.label}</label>
              {/* 라디오 점수 선택 행 */}
              <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"10px",padding:"10px 12px",background:"#f8fafc",borderRadius:"8px",border:"1.5px solid #e2e8f0"}}>
                {field.rows.map(([val])=>{
                  const on=sel===val;
                  return(
                    <div key={val} onClick={()=>{setF(field.id,val);if(field.linkedTo)setF(field.linkedTo,val);}}
                      style={{display:"flex",alignItems:"center",gap:"5px",cursor:"pointer",padding:"4px 8px",borderRadius:"6px",background:on?col.bg:"transparent"}}>
                      <div style={{width:"16px",height:"16px",borderRadius:"50%",border:`2px solid ${on?col.accent:"#94a3b8"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {on&&<div style={{width:"8px",height:"8px",borderRadius:"50%",background:col.accent}}/>}
                      </div>
                      <span style={{fontSize:"13px",fontWeight:on?700:400,color:on?col.accent:"#475569"}}>{val}점</span>
                    </div>
                  );
                })}
              </div>
              {/* 표 */}
              <div style={{...S.tblSection,marginBottom:0}}>
                <table style={{...S.table,marginBottom:0}}>
                  <tbody>
                    {field.rows.map(([val,desc])=>{
                      const on=sel===val;
                      return(
                        <tr key={val} onClick={()=>{setF(field.id,val);if(field.linkedTo)setF(field.linkedTo,val);}}
                          style={{cursor:"pointer",background:on?col.bg:"white",transition:"background 0.1s"}}>
                          <td style={{...S.td,width:"64px",textAlign:"center",fontWeight:800,fontSize:"13px",color:on?col.accent:"#475569",borderRight:"1.5px solid #e2e8f0",whiteSpace:"nowrap"}}>FAC {val}</td>
                          <td style={{...S.td,fontSize:"12px",lineHeight:1.7,color:on?col.text:"#334155",whiteSpace:"pre-line"}}>{desc}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        if(field.type==="rom_table"){
          const romData=fd["_rom"]||{};
          const setRom=(si,ri,side,val)=>setFd(prev=>{
            const d={...(prev["_rom"]||{})};
            const key=si+"_"+ri;
            d[key]={...(d[key]||{}),[side]:val};
            return{...prev,"_rom":d};
          });
          const appendHyphen=(si,ri,side)=>{
            const key=si+"_"+ri;
            const cur=romData[key]?.[side]||"";
            setRom(si,ri,side,cur+"-");
          };
          return(
            <div key={field.id} style={{marginBottom:"8px"}}>
              {ROM_SECTIONS.map((sec,si)=>(
                <div key={si} style={{...S.tblSection,marginBottom:"10px"}}>
                  <div style={{overflowX:"auto"}}>
                    <table style={{...S.table,marginBottom:0,tableLayout:"fixed"}}>
                      <thead><tr>
                        <th style={{...S.th,width:"36%",textAlign:"center"}}>Right</th>
                        <th style={{...S.th,width:"28%",textAlign:"center",background:"#e8f4fd",color:"#1a5f8a"}}>{sec.title}</th>
                        <th style={{...S.th,width:"36%",textAlign:"center"}}>Left</th>
                      </tr></thead>
                      <tbody>
                        {sec.rows.map((row,ri)=>{
                          const key=si+"_"+ri;
                          return(
                            <tr key={ri} style={{background:ri%2===0?"#fafbfc":"white"}}>
                              <td style={{...S.td,textAlign:"center"}}>
                                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"3px"}}>
                                  <input style={S.cellInput} inputMode="decimal" value={romData[key]?.right||""} onChange={e=>setRom(si,ri,"right",e.target.value.replace(/[^0-9().+\-]/g,""))} placeholder="°"/>
                                  <button onTouchStart={e=>e.preventDefault()} onMouseDown={e=>{e.preventDefault();appendHyphen(si,ri,"right");}} style={{flexShrink:0,width:"22px",height:"32px",border:"1.5px solid #cbd5e1",borderRadius:"5px",background:"#f8fafc",color:"#475569",fontSize:"14px",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>-</button>
                                </div>
                              </td>
                              <td style={{...S.td,fontSize:"11px",color:"#475569",textAlign:"center",wordBreak:"break-word",lineHeight:1.4}}>{row}</td>
                              <td style={{...S.td,textAlign:"center"}}>
                                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"3px"}}>
                                  <input style={S.cellInput} inputMode="decimal" value={romData[key]?.left||""} onChange={e=>setRom(si,ri,"left",e.target.value.replace(/[^0-9().+\-]/g,""))} placeholder="°"/>
                                  <button onTouchStart={e=>e.preventDefault()} onMouseDown={e=>{e.preventDefault();appendHyphen(si,ri,"left");}} style={{flexShrink:0,width:"22px",height:"32px",border:"1.5px solid #cbd5e1",borderRadius:"5px",background:"#f8fafc",color:"#475569",fontSize:"14px",fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>-</button>
                                </div>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              ))}
            </div>
          );
        }
        if(field.type==="mmt_sections"){
          const md=fd["_mmt"]||{};
          const setMmt=(gi,si,ri,side,val)=>setFd(prev=>{
            const d={...(prev["_mmt"]||{})};
            const key=gi+"_"+si+"_"+ri;
            d[key]={...(d[key]||{left:"",right:""}),[side]:val};
            return{...prev,"_mmt":d};
          });
          // 그룹 전체 일괄 적용
          const applyAll=(gi,side,val)=>{
            markDirty();
            setFd(prev=>{
              const d={...(prev["_mmt"]||{})};
              const grp=MMT_SECTIONS[gi];
              grp.sections.forEach((sec,si)=>{
                sec.rows.forEach((_,ri)=>{
                  const key=gi+"_"+si+"_"+ri;
                  d[key]={...(d[key]||{left:"",right:""}),[side]:val};
                });
              });
              return{...prev,"_mmt":d};
            });
          };
          const btnStyle=(color)=>({border:`1.5px solid ${color}`,borderRadius:"7px",padding:"5px 10px",fontSize:"11px",fontWeight:700,cursor:"pointer",background:"#fff",color:color,whiteSpace:"nowrap"});
          return(
            <div key={field.id} style={{marginBottom:"8px"}}>
              {/* 일괄 적용 버튼 */}
              <div style={{display:"flex",gap:"8px",marginBottom:"12px",padding:"10px 12px",background:"#fef9f0",borderRadius:"10px",border:"1.5px solid #fcd34d"}}>
                <span style={{fontSize:"11px",fontWeight:700,color:"#92400e",flexShrink:0,alignSelf:"center"}}>일괄<br/>적용</span>
                {/* 우측 */}
                <div style={{flex:1}}>
                  <div style={{fontSize:"10px",fontWeight:700,color:"#94a3b8",textAlign:"center",marginBottom:"4px"}}>Right</div>
                  <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                    {[["상지","5",0],["상지","1",0],["하지","5",1],["하지","1",1]].map(([label,val,gi])=>(
                      <button key={`r-${gi}-${val}`} style={{border:`1.5px solid ${val==="5"?"#e8961e":"#94a3b8"}`,borderRadius:"6px",padding:"4px 0",fontSize:"10px",fontWeight:700,cursor:"pointer",background:"#fff",color:val==="5"?"#e8961e":"#64748b",width:"100%"}}
                        onClick={()=>applyAll(gi,"right",val)}>{label} {val}</button>
                    ))}
                  </div>
                </div>
                {/* 좌측 */}
                <div style={{flex:1}}>
                  <div style={{fontSize:"10px",fontWeight:700,color:"#94a3b8",textAlign:"center",marginBottom:"4px"}}>Left</div>
                  <div style={{display:"flex",flexDirection:"column",gap:"4px"}}>
                    {[["상지","5",0],["상지","1",0],["하지","5",1],["하지","1",1]].map(([label,val,gi])=>(
                      <button key={`l-${gi}-${val}`} style={{border:`1.5px solid ${val==="5"?"#e8961e":"#94a3b8"}`,borderRadius:"6px",padding:"4px 0",fontSize:"10px",fontWeight:700,cursor:"pointer",background:"#fff",color:val==="5"?"#e8961e":"#64748b",width:"100%"}}
                        onClick={()=>applyAll(gi,"left",val)}>{label} {val}</button>
                    ))}
                  </div>
                </div>
              </div>
              {MMT_SECTIONS.map((grp,gi)=>(
                <div key={gi} style={{marginBottom:"14px"}}>
                  <div style={{fontSize:"12px",fontWeight:800,color:"#7a4d0a",background:"#fef3e2",padding:"7px 12px",borderRadius:"8px 8px 0 0",border:"1.5px solid #e8961e",borderBottom:"none",letterSpacing:"0.5px"}}>{grp.group}</div>
                  <div style={{border:"1.5px solid #e8961e",borderRadius:"0 0 8px 8px",overflow:"hidden"}}>
                    {grp.sections.map((sec,si)=>(
                      <table key={si} style={{...S.table,marginBottom:0,tableLayout:"fixed"}}>
                        <thead><tr>
                          <th style={{...S.th,width:"30%",background:"#fef9f0",color:"#7a4d0a",textAlign:"center",wordBreak:"break-word",fontSize:"11px"}}>{sec.title}</th>
                          <th style={{...S.th,width:"35%",textAlign:"center"}}>Right</th>
                          <th style={{...S.th,width:"35%",textAlign:"center"}}>Left</th>
                        </tr></thead>
                        <tbody>
                          {sec.rows.map((row,ri)=>{
                            const key=gi+"_"+si+"_"+ri;
                            return(
                              <tr key={ri} style={{background:ri%2===0?"#fafbfc":"white"}}>
                                <td style={{...S.td,fontSize:"11px",paddingLeft:"10px",wordBreak:"break-word",lineHeight:1.4,color:"#475569"}}>{row}</td>
                                <td style={{...S.td,textAlign:"center"}}>
                                  <MmtSelect value={md[key]?.right??""} onChange={v=>{markDirty();setMmt(gi,si,ri,"right",v);}}/>
                                </td>
                                <td style={{...S.td,textAlign:"center"}}>
                                  <MmtSelect value={md[key]?.left??""} onChange={v=>{markDirty();setMmt(gi,si,ri,"left",v);}}/>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          );
        }
        if(field.type==="mmt_table"){
          const td=fd[field.id]||field.rows.map(()=>({left:"",right:""}));
          return(
            <div key={field.id} style={S.tblSection}>
              <div style={{overflowX:"auto"}}>
                <table style={{...S.table,marginBottom:0}}>
                  <thead><tr>
                    <th style={S.th}>부위</th><th style={S.th}>근육/운동</th>
                    <th style={{...S.th,textAlign:"center"}}>좌측</th>
                    <th style={{...S.th,textAlign:"center"}}>우측</th>
                  </tr></thead>
                  <tbody>
                    {field.rows.map((row,ri)=>(
                      <tr key={ri} style={{background:ri%2===0?"#fafbfc":"white"}}>
                        <td style={S.td}>{row[0]}</td><td style={S.td}>{row[1]}</td>
                        <td style={{...S.td,textAlign:"center"}}>
                          <MmtSelect value={td[ri]?.left??""} onChange={v=>setCell(field.id,ri,"left",v)}/>
                        </td>
                        <td style={{...S.td,textAlign:"center"}}>
                          <MmtSelect value={td[ri]?.right??""} onChange={v=>setCell(field.id,ri,"right",v)}/>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        if(field.type==="bbs_full"){
          const scores=fd["_bbs"]||BBS_ITEMS.map(()=>null);
          const total=scores.reduce((s,v)=>s+(typeof v==="number"?v:parseInt(v)||0),0);
          return(
            <div key={field.id}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",padding:"12px 16px",background:"#f3eeff",borderRadius:"10px",border:"1.5px solid #8b5cf6"}}>
                <span style={{fontSize:"13px",fontWeight:700,color:"#4c1d95"}}>BBS 총점</span>
                <span style={{fontSize:"24px",fontWeight:800,color:"#8b5cf6"}}>{total} <span style={{fontSize:"14px",color:"#94a3b8",fontWeight:400}}>/ 56</span></span>
              </div>
              {BBS_ITEMS.map((item,ri)=>{
                const selected=scores[ri];
                return(
                  <div key={ri} style={{marginBottom:"20px"}}>
                    <div style={{fontSize:"15px",fontWeight:800,color:"#3b1d8a",marginBottom:"8px",padding:"8px 12px",background:"#ede9ff",borderRadius:"8px",borderLeft:"4px solid #8b5cf6",lineHeight:1.4}}>{item.label}</div>
                    {item.opts.map(([score,desc])=>{
                      const on=selected===score;
                      return(
                        <div key={score} className={`bbs-opt${on?" on":""}`} onClick={()=>setBbs(ri,score)}>
                          <span className="bbs-badge">{score}</span>
                          <span style={{fontSize:"11px",lineHeight:1.5,color:on?"#4c1d95":"#64748b",fontWeight:on?600:400}}>{desc}</span>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          );
        }

        if(field.type==="fga_full"){
          const scores=fd["_fga"]||FGA_ITEMS.map(()=>null);
          const total=scores.reduce((s,v)=>s+(typeof v==="number"?v:parseInt(v)||0),0);
          const accent="#16a34a"; const bg="#f0fdf4"; const border="#16a34a"; const dark="#14532d";
          return(
            <div key={field.id}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",padding:"12px 16px",background:bg,borderRadius:"10px",border:`1.5px solid ${border}`}}>
                <span style={{fontSize:"13px",fontWeight:700,color:dark}}>FGA 총점</span>
                <span style={{fontSize:"24px",fontWeight:800,color:accent}}>{total} <span style={{fontSize:"14px",color:"#94a3b8",fontWeight:400}}>/ 30</span></span>
              </div>
              {FGA_ITEMS.map((item,ri)=>{
                const selected=scores[ri];
                return(
                  <div key={ri} style={{marginBottom:"20px"}}>
                    <div style={{fontSize:"15px",fontWeight:800,color:dark,marginBottom:"4px",padding:"8px 12px",background:"#dcfce7",borderRadius:"8px",borderLeft:`4px solid ${accent}`,lineHeight:1.4}}>{item.label}</div>
                    <div style={{fontSize:"11px",color:"#475569",padding:"5px 12px 8px",background:"#f8fafc",borderRadius:"6px",marginBottom:"6px",lineHeight:1.6}}>{item.instruction}</div>
                    {item.opts.map(([score,desc])=>{
                      const on=selected===score;
                      return(
                        <div key={score} onClick={()=>setFga(ri,score)}
                          style={{display:"flex",alignItems:"flex-start",gap:"10px",padding:"9px 12px",borderRadius:"8px",border:`1.5px solid ${on?border:"#e2e8f0"}`,cursor:"pointer",marginBottom:"5px",background:"#fff"}}>
                          <span style={{minWidth:"24px",height:"24px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:"12px",flexShrink:0,marginTop:"1px",
                            background:on?accent:"#fff",color:on?"#fff":"#94a3b8",border:`1.5px solid ${on?accent:"#cbd5e1"}`}}>{score}</span>
                          <span style={{fontSize:"11px",lineHeight:1.5,color:on?dark:"#64748b",fontWeight:on?600:400}}>{desc}</span>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          );
        }

        if(field.type==="fogq_full"){
          const scores=fd["_fogq"]||FOGQ_ITEMS.map(()=>null);
          const total=scores.reduce((s,v)=>s+(typeof v==="number"?v:parseInt(v)||0),0);
          const accent="#f97316"; const bg="#fef3f2"; const border="#f97316"; const dark="#7c2d12";
          return(
            <div key={field.id}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"14px",padding:"12px 16px",background:bg,borderRadius:"10px",border:`1.5px solid ${border}`}}>
                <span style={{fontSize:"13px",fontWeight:700,color:dark}}>FOG-Q 총점</span>
                <span style={{fontSize:"24px",fontWeight:800,color:accent}}>{total} <span style={{fontSize:"14px",color:"#94a3b8",fontWeight:400}}>/ 24</span></span>
              </div>
              {FOGQ_ITEMS.map((item,ri)=>{
                const selected=scores[ri];
                return(
                  <div key={ri} style={{marginBottom:"20px"}}>
                    <div style={{fontSize:"15px",fontWeight:800,color:dark,marginBottom:"6px",padding:"8px 12px",background:"#ffedd5",borderRadius:"8px",borderLeft:`4px solid ${accent}`,lineHeight:1.5}}>{item.label}</div>
                    {item.opts.map(([score,desc])=>{
                      const on=selected===score;
                      return(
                        <div key={score} onClick={()=>setFogq(ri,score)}
                          style={{display:"flex",alignItems:"flex-start",gap:"10px",padding:"9px 12px",borderRadius:"8px",border:`1.5px solid ${on?border:"#e2e8f0"}`,cursor:"pointer",marginBottom:"5px",background:"#fff"}}>
                          <span style={{minWidth:"24px",height:"24px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:"12px",flexShrink:0,marginTop:"1px",
                            background:on?accent:"#fff",color:on?"#fff":"#94a3b8",border:`1.5px solid ${on?accent:"#cbd5e1"}`}}>{score}</span>
                          <span style={{fontSize:"11px",lineHeight:1.5,color:on?dark:"#64748b",fontWeight:on?600:400}}>{desc}</span>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          );
        }

        if(field.type==="table"){
          const td=fd[field.id]||[],two=field.headers.length>=4,one=field.headers.length===3;
          return(
            <div key={field.id} style={S.tblSection}><div style={{overflowX:"auto"}}>
              <table style={{...S.table,marginBottom:0}}>
                <thead><tr>{field.headers.map((h,i)=><th key={i} style={S.th}>{h}</th>)}</tr></thead>
                <tbody>
                  {field.rows.map((row,ri)=>(
                    <tr key={ri} style={{background:ri%2===0?"#fafbfc":"white"}}>
                      {row.map((cell,ci)=><td key={ci} style={S.td}>{cell}</td>)}
                      {two&&<><td style={S.td}><input style={S.cellInput} value={td[ri]?.left??""} onChange={e=>setCell(field.id,ri,"left",e.target.value)}/></td><td style={S.td}><input style={S.cellInput} value={td[ri]?.right??""} onChange={e=>setCell(field.id,ri,"right",e.target.value)}/></td></>}
                      {one&&!two&&<td style={S.td}><input style={S.cellInput} value={td[ri]?.score??""} onChange={e=>setCell(field.id,ri,"score",e.target.value)}/></td>}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div></div>
          );
        }

        if(field.type==="number_auto"){
          return(
            <div key={field.id} style={S.fieldRow}>
              <label style={S.fieldLabel}>{field.label} <span style={{color:"#3b9ede",fontSize:"10px",fontWeight:600,marginLeft:"4px"}}>● 자동계산</span></label>
              <input style={S.inputAuto} type="text" readOnly value={fd[field.id]||""} placeholder={field.placeholder}/>
            </div>
          );
        }

        const isTrialField = ["trial1","trial2","trial3"].includes(field.id);

        if(isTrialField){
          const tm=timers[field.id]||{running:false,elapsed:0};
          const display=tm.running
            ? tm.elapsed.toFixed(2)
            : (fd[field.id]||"");
          return(
            <div key={field.id} style={{...S.fieldRow, opacity: disabled ? 0.35 : 1, pointerEvents: disabled ? "none" : "auto"}}>
              <label style={S.fieldLabel}>{field.label}</label>
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <input style={{...S.input, fontVariantNumeric:"tabular-nums", color: tm.running?"#2563eb":"#1e293b", fontWeight: tm.running?700:400}}
                  type="text" inputMode="decimal"
                  placeholder={field.placeholder}
                  value={display}
                  onChange={e=>{if(!tm.running)setF(field.id,e.target.value);}}
                  readOnly={tm.running}
                />
                {!tm.running?(
                  <button onClick={()=>startTimer(field.id)}
                    style={{flexShrink:0,height:"42px",padding:"0 14px",borderRadius:"9px",border:`1.5px solid ${col.accent}`,background:col.bg,color:col.accent,fontSize:"13px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                    ▶ 시작
                  </button>
                ):(
                  <button onClick={()=>stopTimer(field.id)}
                    style={{flexShrink:0,height:"42px",padding:"0 14px",borderRadius:"9px",border:"1.5px solid #ef4444",background:"#fef2f2",color:"#ef4444",fontSize:"13px",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                    ■ 정지
                  </button>
                )}
                {(fd[field.id]||tm.elapsed>0)&&!tm.running&&(
                  <button onClick={()=>resetTimer(field.id)}
                    style={{flexShrink:0,height:"42px",padding:"0 10px",borderRadius:"9px",border:"1.5px solid #e2e8f0",background:"#f8fafc",color:"#94a3b8",fontSize:"12px",cursor:"pointer"}}>
                    ↺
                  </button>
                )}
              </div>
              {tm.running&&(
                <div style={{fontSize:"28px",fontWeight:800,color:"#2563eb",fontVariantNumeric:"tabular-nums",letterSpacing:"1px",marginTop:"4px"}}>
                  {tm.elapsed.toFixed(2)} <span style={{fontSize:"13px",fontWeight:400,color:"#94a3b8"}}>초</span>
                </div>
              )}
            </div>
          );
        }

        return(
          <div key={field.id} style={{...S.fieldRow, opacity: disabled ? 0.35 : 1, pointerEvents: disabled ? "none" : "auto"}}>
            <label style={S.fieldLabel}>{field.label}</label>
            {field.type==="toggle"?(
              <div style={{display:"flex",gap:"7px",flexWrap:"wrap"}}>
                {field.options.map(opt=>{
                  const on=fd[field.id]===opt;
                  const isFailureOpt = field.id==="test_failure" && opt==="Test failure";
                  const activeColor = isFailureOpt ? "#ef4444" : col.accent;
                  return <button key={opt} onClick={()=>setF(field.id,opt)} style={{border:`1.5px solid ${on?activeColor:"#cbd5e1"}`,borderRadius:"9px",padding:"8px 16px",fontSize:"14px",cursor:"pointer",background:on?activeColor:"#fff",color:on?"#fff":"#475569",fontWeight:on?700:400}}>{opt}</button>;
                })}
              </div>
            ):field.type==="textarea"?(
              <textarea style={S.textarea} placeholder={field.placeholder} value={fd[field.id]||""} onChange={e=>setF(field.id,e.target.value)}/>
            ):(
              <input style={S.input} type="text" inputMode={field.inputMode||(field.type==="number"?"decimal":undefined)} placeholder={field.placeholder} value={fd[field.id]||""} onChange={e=>setF(field.id,e.target.value)}/>
            )}
          </div>
        );
      })}
    </div>
    <div style={{display:"flex",gap:"8px",justifyContent:"flex-end"}}>
      <button style={{background:"#f1f5f9",color:"#475569",border:"none",borderRadius:"10px",padding:"11px 18px",fontSize:"14px",cursor:"pointer"}} onClick={handleCancel}>취소</button>
      <button style={{background:col.accent,color:"#fff",border:"none",borderRadius:"10px",padding:"11px 26px",fontSize:"14px",fontWeight:700,cursor:"pointer"}} onClick={handleSave}>저장</button>
    </div></div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
